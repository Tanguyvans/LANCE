metadata:
  name: "Smart City IoT Lab (representative topology)"
  version: "2.0"
  last_updated: "2026-02-17"
  nmap_scan: "2026-02-17"
  note: "Isolated, offline lab segment with no external route. Representative topology provided for benchmark reproducibility."

networks:
  - id: lan
    name: "LAN Principal"
    subnet: "192.168.88.0/24"
    vlan: null

devices:
  - id: mikrotik
    name: "MikroTik RB5009"
    type: router
    ip: "192.168.88.1"
    network: lan
    role: "Routeur/Firewall"
    os: "RouterOS"
    os_version: "7.18.2"
    services:
      - name: ftp
        port: 21
        protocol: tcp
        version: "MikroTik ftpd 7.18.2"
      - name: ssh
        port: 22
        protocol: tcp
        version: "MikroTik RouterOS sshd"
      - name: telnet
        port: 23
        protocol: tcp
      - name: dns
        port: 53
        protocol: tcp
      - name: http
        port: 80
        protocol: tcp
      - name: winbox
        port: 8291
        protocol: tcp

  - id: netgear
    name: "Netgear GS348PP"
    type: switch
    network: lan
    role: "Switch PoE 48 ports"

  - id: jetson
    name: "Jetson Orin Nano"
    type: compute
    ip: "192.168.88.248"
    network: lan
    role: "Edge AI, Vision"
    os: "Ubuntu"
    os_version: "22.04.5"
    firmware: "JetPack R36.4.7"
    services:
      - name: ssh
        port: 22
        protocol: tcp

  - id: cam_turret
    name: "Ubiquiti AI Turret"
    type: camera
    ip: "192.168.88.230"
    network: lan
    role: "Caméra surveillance"
    firmware: "5.1.240"

  - id: nvr
    name: "Ubiquiti UNVR"
    type: compute
    ip: "192.168.88.253"
    network: lan
    role: "Stockage vidéo surveillance"
    os: "UniFi OS"
    os_version: "5.0.13"

  - id: rpi5
    name: "Raspberry Pi 5"
    type: gateway
    ip: "192.168.88.247"
    network: lan
    role: "Gateway Zigbee, MQTT Broker"
    os: "Debian"
    os_version: "13 (Trixie)"
    services:
      - name: ssh
        port: 22
        protocol: tcp
        version: "OpenSSH 10.0p1"
      - name: zigbee2mqtt_ui
        port: 8080
        protocol: tcp
        version: "koenkk/zigbee2mqtt (Docker)"
      - name: mqtt
        port: 1883
        protocol: tcp
        version: "Mosquitto 2.0.21"

  - id: iot_hub
    name: "Raspberry Pi 5 (IoT Hub)"
    type: gateway
    ip: "192.168.88.231"
    network: lan
    role: "IoT Hub"
    os: "Debian"
    os_version: "13 (Trixie)"
    services:
      - name: ssh
        port: 22
        protocol: tcp
        version: "OpenSSH 10.0p1"
      - name: mqtt
        port: 1883
        protocol: tcp
        version: "Mosquitto 2.0.21"

  - id: wisgate
    name: "WisGate Edge Lite 2"
    type: gateway
    ip: "192.168.88.238"
    network: lan
    role: "Gateway LoRaWAN EU868"
    firmware: "RAK7268C"
    services:
      - name: ssh
        port: 22
        protocol: tcp
        version: "Dropbear 2020.81"
      - name: http
        port: 80
        protocol: tcp
        version: "nginx 1.19.6"
      - name: https
        port: 443
        protocol: tcp
        version: "nginx 1.19.6"

  - id: eap613
    name: "TP-Link EAP613"
    type: ap
    ip: "192.168.88.251"
    network: lan
    role: "AP WiFi NATO-Lab"
    services:
      - name: http
        port: 80
        protocol: tcp
        version: "TP-LINK HTTPD/1.0"
      - name: https
        port: 443
        protocol: tcp
        version: "TP-LINK HTTPD/1.0"
      - name: management
        port: 44443
        protocol: tcp

  # Capteurs LoRaWAN
  - id: em310
    name: "Milesight EM310-UDL"
    type: sensor
    role: "Capteur distance ultrason"
    protocols: [lorawan]

  - id: sensecap
    name: "SenseCAP S2120"
    type: sensor
    role: "Station météo"
    protocols: [lorawan]

  - id: elsys
    name: "Elsys EMS"
    type: sensor
    role: "Capteur environnemental"
    protocols: [lorawan]

  - id: dragino
    name: "Dragino PS-LB"
    type: sensor
    role: "Capteur pression"
    protocols: [lorawan]

  # Capteurs Zigbee
  - id: aqara_vib
    name: "Aqara Vibration"
    type: sensor
    role: "Capteur vibration"
    protocols: [zigbee]

  - id: aqara_door
    name: "Aqara Door/Window"
    type: sensor
    role: "Capteur porte/fenêtre"
    protocols: [zigbee]

links:
  - source: mikrotik
    target: netgear
    type: ethernet
    description: "Uplink principal"

  - source: netgear
    target: jetson
    type: ethernet

  - source: netgear
    target: rpi5
    type: ethernet

  - source: netgear
    target: wisgate
    type: ethernet

  - source: netgear
    target: eap613
    type: ethernet

  - source: netgear
    target: cam_turret
    type: ethernet

  - source: netgear
    target: iot_hub
    type: ethernet

  - source: netgear
    target: nvr
    type: ethernet

  # LoRaWAN → WisGate
  - source: em310
    target: wisgate
    type: lorawan

  - source: sensecap
    target: wisgate
    type: lorawan

  - source: elsys
    target: wisgate
    type: lorawan

  - source: dragino
    target: wisgate
    type: lorawan

  # Zigbee → RPi5
  - source: aqara_vib
    target: rpi5
    type: zigbee

  - source: aqara_door
    target: rpi5
    type: zigbee

  # MQTT forwarding → RPi5 (Mosquitto broker)
  - source: wisgate
    target: rpi5
    type: mqtt
    description: "LoRaWAN data → MQTT broker"

  # Internet
  - source: internet
    target: mikrotik
    type: wan
    description: "Accès Internet"

external:
  - id: internet
    name: "Internet"
    type: external
