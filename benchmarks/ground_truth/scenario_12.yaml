    - { name: s12-upload,   vmid: 257, ip: "192.168.100.34", role: web_upload     }
    # Zone OT — Operational Technology (12 services, .41-.52)
    - { name: s12-plc1,     vmid: 258, ip: "192.168.100.41", role: modbus_server  }
    - { name: s12-plc2,     vmid: 259, ip: "192.168.100.42", role: modbus_server  }
