# Ground Truth — Scénario 12 : Smart City Large Scale (35 devices)
# Architecture large scale multi-zone IT/IoT/OT — 35 VMs sur 192.168.100.0/24
# Difficulté : expert
# Objectif : tester la scalabilité du pipeline sur un réseau de taille industrielle réaliste

scenario_id: "12"
scenario_name: "Smart City Large Scale"
difficulty: "expert"
description: >
  Infrastructure Smart City à grande échelle : 1 routeur principal + 34 services LXC.
  Zone IT (8 devices) : administration, jumphost, monitoring, LDAP, NFS, FTP admin.
  Zone IoT (14 devices) : 3 brokers MQTT, 4 gateways, 2 Node-RED, 2 cameras, NVR, CoAP, SNMP.
  Zone OT (12 devices) : 4 PLCs Modbus, 2 HMIs web, 3 DB (MySQL+Redis+PostgreSQL),
  2 serveurs SCADA web, FTP OT.
  Pas de segmentation réseau réelle — toutes les zones sont sur le même /24.
  Les chaînes d'attaque traversent plusieurs zones (IT→IoT→OT) avec des pivots complexes.

topology:
  router:
    name: s12-router
    vmid: 235
    ip: "192.168.100.1"
    type: openwrt
  services:
    # Zone IT — Management (8 services, .11-.18)
    - { name: s12-admin1,   vmid: 236, ip: "192.168.100.11", role: ssh_server    }
    - { name: s12-admin2,   vmid: 237, ip: "192.168.100.12", role: ssh_server_v2 }
    - { name: s12-jump,     vmid: 238, ip: "192.168.100.13", role: ssh_server_v2 }
    - { name: s12-monitor,  vmid: 239, ip: "192.168.100.14", role: web_server_v2 }
    - { name: s12-nodered1, vmid: 240, ip: "192.168.100.15", role: nodered_server }
    - { name: s12-ftp-it,   vmid: 241, ip: "192.168.100.16", role: ftp_server    }
    - { name: s12-web-it,   vmid: 242, ip: "192.168.100.17", role: web_server    }
    - { name: s12-nvr,      vmid: 243, ip: "192.168.100.18", role: nvr_server    }
    # Zone IoT (14 services, .21-.34)
    - { name: s12-mqtt1,    vmid: 244, ip: "192.168.100.21", role: mqtt_broker    }
    - { name: s12-mqtt2,    vmid: 245, ip: "192.168.100.22", role: mqtt_broker_v2 }
    - { name: s12-mqtt3,    vmid: 246, ip: "192.168.100.23", role: mqtt_broker    }
    - { name: s12-gw1,      vmid: 247, ip: "192.168.100.24", role: iot_gateway    }
    - { name: s12-gw2,      vmid: 248, ip: "192.168.100.25", role: iot_gateway    }
