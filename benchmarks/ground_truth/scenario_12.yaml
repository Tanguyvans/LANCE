    - { name: s12-ftp-ot,   vmid: 269, ip: "192.168.100.52", role: ftp_server     }

  links:
    # IT interne
    - { source: s12-admin1,   target: s12-admin2,   protocol: ethernet }
    - { source: s12-admin1,   target: s12-jump,     protocol: ethernet }
    - { source: s12-admin2,   target: s12-monitor,  protocol: ethernet }
