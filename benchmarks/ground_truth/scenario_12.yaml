    - { source: s12-mqtt3,    target: s12-gw4,      protocol: mqtt     }
    - { source: s12-mqtt2,    target: s12-nodered2, protocol: mqtt     }
    - { source: s12-gw1,      target: s12-gw2,      protocol: ethernet }
    - { source: s12-gw3,      target: s12-gw4,      protocol: ethernet }
    - { source: s12-nodered2, target: s12-coap,     protocol: ethernet }
    # IoT → OT
    - { source: s12-gw1,      target: s12-plc1,     protocol: ethernet }
    - { source: s12-gw2,      target: s12-plc2,     protocol: ethernet }
    - { source: s12-gw3,      target: s12-plc3,     protocol: ethernet }
    - { source: s12-gw4,      target: s12-plc4,     protocol: ethernet }
    - { source: s12-nodered2, target: s12-plc1,     protocol: ethernet }
    # OT interne
    - { source: s12-hmi1,     target: s12-plc1,     protocol: ethernet }
    - { source: s12-hmi1,     target: s12-plc2,     protocol: ethernet }
    - { source: s12-hmi2,     target: s12-plc3,     protocol: ethernet }
    - { source: s12-hmi2,     target: s12-plc4,     protocol: ethernet }
    - { source: s12-hmi1,     target: s12-db-ot1,   protocol: ethernet }
    - { source: s12-hmi2,     target: s12-db-ot2,   protocol: ethernet }
    - { source: s12-monitor,  target: s12-redis,    protocol: ethernet }
    - { source: s12-historian, target: s12-db-ot1,  protocol: ethernet }
    - { source: s12-scada,    target: s12-plc1,     protocol: ethernet }

# ── Vulnérabilités plantées (sélection représentative — 1-2 par device) ──────
vulnerabilities:

  # Router
  - id: V1
    device: s12-router
    ip: "192.168.100.1"
    role: router
    title: "Telnet activé (port 23)"
    severity: medium
    category: misconfiguration
    owasp_iot: "I2 - Insecure Network Services"
    mitre_ics: "Initial Access"
    cve: null
    indicators: ["Port 23/tcp ouvert"]
    verification: "nmap -p 23 192.168.100.1"

  - id: V2
    device: s12-router
    ip: "192.168.100.1"
    role: router
    title: "LuCI admin accessible depuis le WAN (port 80)"
    severity: critical
    category: misconfiguration
    owasp_iot: "I3 - Insecure Ecosystem Interfaces"
    mitre_ics: "Initial Access"
    cve: null
    indicators: ["Port 80/tcp ouvert sur WAN"]
    verification: "curl http://192.168.100.1/"

  # Zone IT
  - id: V3
    device: s12-admin1
    ip: "192.168.100.11"
    role: ssh_server
    title: "SSH credentials par défaut (admin/admin)"
    severity: high
    category: default_credentials
    owasp_iot: "I1 - Weak/Hardcoded Passwords"
    mitre_ics: "Initial Access"
    cve: null
    indicators: ["Port 22/tcp", "Login SSH admin:admin réussi"]
    verification: "ssh admin@192.168.100.11"

  - id: V4
    device: s12-admin1
    ip: "192.168.100.11"
    role: ssh_server
    title: "SSH ciphers faibles"
    severity: low
    category: weak_crypto
    owasp_iot: "I7 - Insecure Data Transfer"
    mitre_ics: "Collection"
    cve: null
    indicators: ["ssh-audit détecte aes128-cbc, hmac-sha1"]
    verification: "ssh-audit 192.168.100.11"

  - id: V5
