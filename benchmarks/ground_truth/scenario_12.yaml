    - { name: s12-gw4,      vmid: 250, ip: "192.168.100.27", role: iot_gateway    }
    - { name: s12-nodered2, vmid: 251, ip: "192.168.100.28", role: nodered_server }
    - { name: s12-cam1,     vmid: 252, ip: "192.168.100.29", role: camera_server  }
    - { name: s12-cam2,     vmid: 253, ip: "192.168.100.30", role: camera_server  }
    - { name: s12-cam3,     vmid: 254, ip: "192.168.100.31", role: camera_server  }
