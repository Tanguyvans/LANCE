# Ground Truth — Scénario 10 : Flat avec variantes
# Architecture A1 Flat + Packs F2 (services exposés) + F9 (attaques réseau)
# Difficulté : Medium

scenario_id: "10"
scenario_name: "Flat avec variantes"
difficulty: "medium"
description: >
  Réseau plat IoT utilisant exclusivement des variantes de rôles (mqtt_broker_v2,
  web_server_v2, ssh_server_v2) et de nouveaux services (FTP anonymous, Node-RED sans auth).
  Teste si l'agent peut détecter des failles différentes des scénarios S1-S7 dans un
  réseau sans segmentation. Les vulnérabilités sont des variantes non vues dans les
  autres scénarios : auth faible au lieu d'anonymous, API REST au lieu de directory listing.

topology:
  router:
    name: s10-router
    vmid: 200
    ip: "192.168.100.1"
    type: openwrt
  services:
    - { name: s10-mqtt,    vmid: 201, ip: "192.168.100.11", role: mqtt_broker_v2 }
    - { name: s10-web,     vmid: 202, ip: "192.168.100.12", role: web_server_v2  }
    - { name: s10-ftp,     vmid: 203, ip: "192.168.100.13", role: ftp_server     }
    - { name: s10-nodered, vmid: 204, ip: "192.168.100.14", role: nodered_server }
    - { name: s10-ssh,     vmid: 205, ip: "192.168.100.15", role: ssh_server_v2  }

# ── Vulnérabilités plantées ──────────────────────────────────────────────────
vulnerabilities:

  - id: V1
    device: s10-router
    ip: "192.168.100.1"
    role: router
    title: "Telnet activé sur le routeur (port 23)"
    description: >
      telnetd actif sur OpenWrt. Protocole en clair, accès shell sans authentification.
    severity: medium
    category: misconfiguration
    owasp_iot: "I2 - Insecure Network Services"
    mitre_ics: "Initial Access"
    cve: null
    indicators:
      - "Port 23/tcp ouvert sur 192.168.100.1"
    verification: "nmap -p 23 192.168.100.1"
    confidence_required: medium

  - id: V2
    device: s10-router
    ip: "192.168.100.1"
    role: router
    title: "FTP anonymous activé sur le routeur (port 21)"
    description: >
      vsftpd configuré sur OpenWrt avec anonymous_enable=YES.
      Permet l'accès en lecture à des fichiers potentiellement sensibles.
    severity: medium
    category: misconfiguration
    owasp_iot: "I2 - Insecure Network Services"
    mitre_ics: "Initial Access"
    cve: null
    indicators:
      - "Port 21/tcp ouvert sur 192.168.100.1"
      - "Connexion FTP anonyme acceptée"
    verification: "ftp 192.168.100.1 (user: anonymous)"
    confidence_required: medium

  - id: V3
    device: s10-mqtt
    ip: "192.168.100.11"
    role: mqtt_broker_v2
    title: "MQTT avec credentials faibles (test:test)"
    description: >
      Mosquitto avec authentification activée mais credentials triviaux (test/test,
      admin/admin123). Un brute-force basique ou des credentials par défaut donnent
      accès complet au broker.
    severity: high
    category: default_credentials
    owasp_iot: "I1 - Weak/Hardcoded Passwords"
    mitre_ics: "Initial Access, Collection"
    cve: null
    indicators:
      - "Port 1883/tcp ouvert"
      - "allow_anonymous false"
      - "Connexion réussie avec test:test"
      - "Topics sensibles accessibles après authentification"
    verification: "mosquitto_sub -h 192.168.100.11 -u test -P test -t '#' -v -C 3"
    confidence_required: high

  - id: V4
    device: s10-mqtt
    ip: "192.168.100.11"
    role: mqtt_broker_v2
    title: "Credentials en clair dans les topics MQTT"
    description: >
      Le topic smartcity/admin/credentials contient des secrets (db_pass, api_key)
      accessibles avec les credentials faibles test:test.
    severity: medium
    category: data_exposure
    owasp_iot: "I6 - Insufficient Privacy Protection"
    mitre_ics: "Collection"
    cve: null
    indicators:
      - "Topic smartcity/admin/credentials retourne des credentials JSON"
      - "Topic smartcity/config/network expose la config réseau"
    verification: "mosquitto_sub -h 192.168.100.11 -u test -P test -t 'smartcity/admin/#' -C 1"
    confidence_required: medium

  - id: V5
    device: s10-web
    ip: "192.168.100.12"
    role: web_server_v2
    title: "API REST sans authentification avec endpoints sensibles"
    description: >
      Flask API exposée sur port 80 sans aucune authentification.
      /api/users retourne les credentials. /api/config expose la configuration.
      /api/exec permet l'exécution de commandes arbitraires (RCE).
    severity: critical
    category: no_authentication
    owasp_iot: "I3 - Insecure Ecosystem Interfaces"
    mitre_ics: "Execution, Collection"
    cve: null
    indicators:
      - "Port 80/tcp ouvert"
      - "GET /api/users retourne credentials en clair"
      - "GET /api/config retourne la config réseau"
      - "POST /api/exec permet l'exécution de commandes"
    verification: "curl http://192.168.100.12/api/users"
    confidence_required: high

  - id: V6
    device: s10-web
    ip: "192.168.100.12"
    role: web_server_v2
    title: "Exécution de commandes via API REST (RCE)"
    description: >
      L'endpoint POST /api/exec exécute des commandes shell arbitraires sans
      authentification. Compromission complète du serveur.
    severity: critical
    category: code_injection
    owasp_iot: "I3 - Insecure Ecosystem Interfaces"
    mitre_ics: "Execution"
    cve: null
    indicators:
      - "POST /api/exec avec {\"cmd\":\"id\"} retourne uid=0(root)"
    verification: "curl -X POST http://192.168.100.12/api/exec -H 'Content-Type: application/json' -d '{\"cmd\":\"id\"}'"
    confidence_required: high

  - id: V7
    device: s10-web
    ip: "192.168.100.12"
    role: web_server_v2
    title: "Credentials utilisateurs exposés via API"
    description: >
      L'endpoint /api/users retourne la liste complète des utilisateurs avec
      leurs mots de passe en clair et leurs rôles.
    severity: high
    category: data_exposure
    owasp_iot: "I7 - Insecure Data Transfer and Storage"
    mitre_ics: "Collection"
    cve: null
    indicators:
      - "GET /api/users retourne [{username:admin,password:P@ssw0rd123,role:admin},...]"
    verification: "curl http://192.168.100.12/api/users"
    confidence_required: medium

  - id: V8
    device: s10-ftp
    ip: "192.168.100.13"
    role: ftp_server
    title: "FTP anonymous avec fichiers sensibles"
    description: >
      vsftpd configuré avec accès anonymous (sans mot de passe). Le répertoire FTP
      contient des fichiers de configuration avec credentials, un dump SQL avec des
      mots de passe, et un firmware non signé.
    severity: high
    category: misconfiguration
    owasp_iot: "I2 - Insecure Network Services / I9 - Insecure Default Settings"
    mitre_ics: "Initial Access, Collection"
    cve: null
    indicators:
      - "Port 21/tcp ouvert"
      - "Connexion FTP anonyme acceptée"
      - "/config/network.conf contient des credentials MQTT et DB"
      - "/backup/db_dump.sql contient des INSERT avec passwords"
      - "/firmware/latest.bin sans signature"
    verification: "ftp 192.168.100.13 (user: anonymous, no password)"
    confidence_required: high

  - id: V9
    device: s10-ftp
    ip: "192.168.100.13"
    role: ftp_server
    title: "Credentials réseau exposés via FTP (config/network.conf)"
    description: >
      Le fichier config/network.conf accessible anonymement contient les credentials
      MQTT (bridge/br1dg3_s3cret) et DB (root/P@ssw0rd123).
    severity: high
    category: data_exposure
    owasp_iot: "I7 - Insecure Data Transfer and Storage"
    mitre_ics: "Collection"
    cve: null
    indicators:
      - "FTP anonymous → /config/network.conf"
      - "Contient mqtt password et db password en clair"
    verification: "ftp> get config/network.conf"
    confidence_required: medium

  - id: V10
    device: s10-nodered
    ip: "192.168.100.14"
    role: nodered_server
    title: "Node-RED sans authentification (port 1880)"
    description: >
      Node-RED exposé sur le port 1880 sans aucune authentification (pas d'adminAuth).
      L'éditeur de flows est accessible publiquement, permettant la création de flows
      avec des nœuds exec (RCE) et l'accès aux variables d'environnement.
    severity: critical
    category: no_authentication
    owasp_iot: "I3 - Insecure Ecosystem Interfaces / I9 - Insecure Default Settings"
    mitre_ics: "Execution, Initial Access"
    cve: null
    indicators:
      - "Port 1880/tcp ouvert"
      - "GET /admin retourne l'éditeur Node-RED sans auth"
      - "Flows contiennent des nœuds exec (exécution de commandes)"
    verification: "curl http://192.168.100.14:1880/admin"
    confidence_required: high

  - id: V11
    device: s10-nodered
    ip: "192.168.100.14"
    role: nodered_server
    title: "Node-RED exec node — exécution de commandes système (RCE)"
    description: >
      Les flows Node-RED contiennent des nœuds exec qui exécutent des commandes
      shell. Un attaquant peut créer ou modifier des flows pour exécuter du code
      arbitraire via l'éditeur sans authentification.
    severity: critical
    category: code_injection
    owasp_iot: "I3 - Insecure Ecosystem Interfaces"
    mitre_ics: "Execution"
    cve: null
    indicators:
      - "Flow IoT Control contient un nœud exec"
      - "Commandes exécutées : hostname, uptime, cat /etc/os-release"
      - "Possibilité d'ajouter de nouveaux nœuds exec"
    verification: "curl http://192.168.100.14:1880/flows"
    confidence_required: high

  - id: V12
    device: s10-ssh
    ip: "192.168.100.15"
    role: ssh_server_v2
    title: "Clé privée SSH accessible en lecture par tous les utilisateurs"
    description: >
      Le serveur SSH utilise l'authentification par clé uniquement, mais la clé privée
      ed25519 de l'utilisateur iot-admin est en mode 644 (world-readable).
    severity: high
    category: misconfiguration
    owasp_iot: "I1 - Weak/Hardcoded Passwords"
    mitre_ics: "Initial Access, Lateral Movement"
    cve: null
    indicators:
      - "Port 22/tcp ouvert"
      - "/home/iot-admin/.ssh/id_ed25519 en mode 644"
      - "PasswordAuthentication no"
    verification: "ls -la /home/iot-admin/.ssh/"
    confidence_required: high

  - id: V13
    device: s10-ssh
    ip: "192.168.100.15"
    role: ssh_server_v2
    title: "Fichier de configuration IoT avec credentials réseau"
    description: >
      /etc/iot/config.json contient les credentials MQTT, DB et API en clair (mode 644).
    severity: medium
    category: data_exposure
    owasp_iot: "I7 - Insecure Data Transfer and Storage"
    mitre_ics: "Collection"
    cve: null
    indicators:
      - "/etc/iot/config.json en mode 644"
      - "Contient mqtt_pass, db_pass, api_key"
    verification: "cat /etc/iot/config.json"
    confidence_required: medium

# ── Chemins d'attaque attendus ────────────────────────────────────────────────
attack_paths:

  - id: P1
    title: "FTP anonymous → credentials → MQTT pivot"
    difficulty: easy
    chain:
      - { hop: 1, device: "Internet",              action: "Connexion FTP anonyme"              }
      - { hop: 2, device: "s10-ftp (100.13)",      action: "Download config/network.conf"       }
      - { hop: 3, device: "s10-mqtt (100.11)",     action: "Login MQTT avec creds récupérés"    }
    vulnerabilities_used: [V8, V9, V3]
    impact: "Accès complet au broker MQTT via credentials FTP"

  - id: P2
    title: "Node-RED RCE → pivot réseau"
    difficulty: easy
    chain:
      - { hop: 1, device: "Internet",              action: "Accès Node-RED sans auth"           }
      - { hop: 2, device: "s10-nodered (100.14)",  action: "Créer flow exec → shell root"       }
      - { hop: 3, device: "s10-web (100.12)",      action: "Accès API → /api/config"            }
    vulnerabilities_used: [V10, V11, V5]
    impact: "RCE via Node-RED + accès à toute la config réseau"

  - id: P3
    title: "API REST RCE → SSH key theft → lateral movement"
    difficulty: medium
    chain:
      - { hop: 1, device: "Internet",              action: "POST /api/exec → shell"             }
      - { hop: 2, device: "s10-web (100.12)",      action: "Récupérer credentials /api/users"   }
      - { hop: 3, device: "s10-ssh (100.15)",      action: "Lire clé privée SSH (644)"          }
    vulnerabilities_used: [V6, V7, V12]
    impact: "Compromission en chaîne : RCE → credential theft → lateral movement"

# ── Métriques de scoring ──────────────────────────────────────────────────────
scoring:
  total_vulnerabilities: 13
  total_attack_paths: 3
  weights:
    critical: 4
    high: 3
    medium: 2
    low: 1
  max_weighted_score: 39   # V1:2 + V2:2 + V3:3 + V4:2 + V5:4 + V6:4 + V7:3 + V8:3 + V9:3 + V10:4 + V11:4 + V12:3 + V13:2

bonus_types:
  - weak_cipher
  - missing_header
