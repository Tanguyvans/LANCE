id: f8_info_disclosure
name: Information Disclosure
vulnerabilities:
  camera_server:
  - title: Server version disclosure (nginx)
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le header HTTP Server révèle la version exacte de nginx sur la caméra.
    indicators:
    - Header Server contient nginx/ suivi d'un numéro de version
    verification: curl -sI http://{ip}/ | grep Server
    confidence_required: low
    scenarios:
    - '5'
  iot_gateway:
  - title: robots.txt exposant des paths sensibles internes (IoT gateway)
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le fichier robots.txt sur la gateway IoT révèle l'existence de répertoires
      sensibles (/admin/, /api/internal/, /backup/, /config/, /.env).
    indicators:
    - GET /robots.txt retourne Disallow pour /admin/, /backup/, /config/, /.env
    verification: curl http://{ip}/robots.txt
    confidence_required: low
    scenarios:
    - '4'
  - title: robots.txt exposant des paths sensibles internes
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le fichier robots.txt révèle l'existence de répertoires sensibles
      sur le hub IoT.
    indicators:
    - GET /robots.txt retourne Disallow pour /admin/, /api/internal/, /backup/, /.env
    verification: curl http://{ip}/robots.txt
    confidence_required: low
    scenarios:
    - '6'
  mqtt_broker:
  - title: MQTT $SYS topics accessibles (info disclosure)
    severity: low
    category: info_disclosure
    owasp_iot: I6 - Insufficient Privacy Protection
    mitre_ics: Discovery
    description: 'Le broker Mosquitto publie des métriques internes sur $SYS/# : version,
      nombre de clients connectés, messages/s, uptime. Permet le profilage du broker.'
    indicators:
    - mosquitto_sub -t '$SYS/#' retourne des métriques broker
    - $SYS/broker/version expose la version Mosquitto
    verification: mosquitto_sub -h {ip} -t '$SYS/#' -v -C 5
    confidence_required: low
    scenarios:
    - '1'
    - '3'
  snmp_server:
  - title: SNMP information disclosure (sysLocation, sysContact)
    severity: low
    category: info_disclosure
    owasp_iot: I6 - Insufficient Privacy Protection
    mitre_ics: Discovery
    description: 'SNMP expose des informations sur l''infrastructure : emplacement
      physique (sysLocation), contact admin (sysContact), nom du système (sysName).'
    indicators:
    - sysLocation = IoT Sensor Network — Building A
    - sysContact = admin@smartcity.local
    verification: snmpget -v2c -c public {ip} sysLocation.0
    confidence_required: low
    scenarios:
    - '9'
  ssh_server:
  - title: SSH banner disclosure (OS et version)
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le banner SSH (SSH-2.0-OpenSSH_9.2p1 Debian-2+deb12u3) révèle l'OS
      exact et la version OpenSSH. Différent de la faiblesse des ciphers (V7).
    indicators:
    - Connexion TCP port 22 retourne SSH-2.0-OpenSSH_X.Xp1 Debian-...
    verification: nc -w2 {ip} 22
    confidence_required: low
    scenarios:
    - '1'
    - '4'
  web_server:
  - title: Absence de security headers HTTP (X-Frame-Options, HSTS, CSP)
    severity: low
    category: missing_header
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Collection
    description: 'Le serveur nginx ne retourne aucun header de sécurité HTTP : pas
      de X-Frame-Options, pas de Strict-Transport-Security, pas de Content-Security-Policy.
      Facilite les attaques clickjacking et XSS.'
    indicators:
    - Réponse HTTP sans X-Frame-Options
    - Réponse HTTP sans Strict-Transport-Security
    - Réponse HTTP sans Content-Security-Policy
    verification: curl -sI http://{ip}/ | grep -iE 'X-Frame|Strict-Transport|Content-Security'
    confidence_required: low
    scenarios:
    - '1'
    - '2'
    - '5'
  - title: Server version disclosure (nginx)
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: 'Le header HTTP Server révèle la version exacte de nginx (ex: nginx/1.22.1).
      Facilite le ciblage de CVE spécifiques par un attaquant.'
    indicators:
    - Header Server contient nginx/ suivi d'un numéro de version
    verification: curl -sI http://{ip}/ | grep Server
    confidence_required: low
    scenarios:
    - '1'
    - '2'
    - '3'
  - title: robots.txt exposant des paths sensibles internes (portail web)
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le fichier robots.txt sur le portail web révèle l'existence de répertoires
      sensibles (/admin/, /api/internal/, /backup/, /config/, /.env).
    indicators:
    - GET /robots.txt retourne Disallow pour /admin/, /backup/, /config/, /.env
    verification: curl http://{ip}/robots.txt
    confidence_required: low
    scenarios:
    - '6'
  web_upload:
  - title: robots.txt exposant des paths sensibles internes
    severity: low
    category: info_disclosure
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Discovery
    description: Le fichier robots.txt révèle l'existence de répertoires sensibles
      (/admin/, /api/internal/, /backup/, /config/, /.env).
    indicators:
    - GET /robots.txt retourne Disallow pour /admin/, /backup/, /config/, /.env
    verification: curl http://{ip}/robots.txt
    confidence_required: low
    scenarios:
    - '4'
