id: f2_misconfig
name: Misconfigurations
vulnerabilities:
  camera_server:
  - title: Flux caméra HTTP accessible sans authentification
    severity: medium
    category: misconfiguration
    owasp_iot: I3 - Insecure Ecosystem Interfaces / I6 - Insufficient Privacy Protection
    mitre_ics: Collection
    description: Interface caméra IP nginx exposant le flux et le panneau admin sur
      port 80 sans authentification. L'endpoint /admin et la page d'accueil sont accessibles
      sans login.
    indicators:
    - Port 80/tcp ouvert
    - GET http://{ip}/ retourne l'interface IP Camera sans auth
    - GET http://{ip}/admin retourne 200 sans authentification
    verification: curl -o /dev/null -s -w '%{http_code}' http://{ip}/admin
    confidence_required: medium
    scenarios:
    - '6'
  coap_server:
  - title: CoAP sans DTLS (port 5683/UDP)
    severity: high
    category: misconfiguration
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Collection, Impair Process Control
    description: Serveur CoAP exposé sur le port 5683 sans chiffrement DTLS. Les communications
      sont en clair. L'endpoint /config retourne la configuration avec des secrets
      (api_key, mqtt_broker). L'endpoint /actuator/valve permet le contrôle d'actionneurs.
    indicators:
    - Port 5683/udp ouvert
    - GET coap://{ip}/config retourne des secrets
    - PUT coap://{ip}/config modifie la configuration
    - POST coap://{ip}/actuator/valve contrôle un actionneur
    verification: coap-client -m get coap://{ip}/config
    confidence_required: high
    scenarios:
    - '9'
  ftp_server:
  - title: FTP anonymous avec fichiers sensibles
    severity: high
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: vsftpd configuré avec accès anonymous (sans mot de passe). Le répertoire
      FTP contient des fichiers de configuration avec credentials, un dump SQL avec
      des mots de passe, et un firmware non signé.
    indicators:
    - Port 21/tcp ouvert
    - Connexion FTP anonyme acceptée
    - /config/network.conf contient des credentials MQTT et DB
    - /backup/db_dump.sql contient des INSERT avec passwords
    - /firmware/latest.bin sans signature
    verification: 'ftp {ip} (user: anonymous, no password)'
    confidence_required: high
    scenarios:
    - '10'
  iot_gateway:
  - title: Interface HTTP admin sans authentification (port 80)
    severity: high
    category: misconfiguration
    owasp_iot: I3 - Insecure Ecosystem Interfaces
    mitre_ics: Collection
    description: nginx exposé sur port 80 avec un endpoint /admin accessible sans
      authentification. Retourne des informations système.
    indicators:
    - Port 80/tcp ouvert
    - GET /admin retourne 200 avec message 'no auth required'
    - GET /api/devices expose la liste des devices du réseau
    - GET /api/status expose les connexions internes
    verification: curl http://{ip}/admin
    confidence_required: medium
    scenarios:
    - '2'
    - '6'
  - title: Interface HTTP admin sans authentification (WisGate simulé)
    severity: high
    category: misconfiguration
    owasp_iot: I3 - Insecure Ecosystem Interfaces
    mitre_ics: Collection, Discovery
    description: nginx expose /admin sur port 80 sans authentification. /api/devices
      et /api/status exposent la topologie complète du réseau. Simule l'interface
      admin HTTP de la WisGate Edge réelle.
    indicators:
    - Port 80/tcp ouvert
    - GET /admin → 200 'Admin panel — no auth required'
    - GET /api/devices → liste JSON des devices du réseau
    - GET /api/status → forwarding vers DB (100.14:3306) exposé
    verification: curl http://{ip}/api/devices
    confidence_required: medium
    scenarios:
    - '3'
  - title: IoT Gateway — Dropbear + HTTP admin sans auth
    severity: medium
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: T0822 - External Remote Services
    description: Gateway LoRa/IoT avec Dropbear SSH (vulnérable Terrapin CVE-2023-48795)
      et interface HTTP admin accessible sans authentification.
    cve: CVE-2023-48795
    indicators:
    - Port 22/tcp (Dropbear) ouvert
    - Port 80/tcp — GET /admin répond sans authentification
    - Dropbear version < 2024.84 (Terrapin)
    verification: curl http://{ip}/admin
    confidence_required: medium
    scenarios:
    - '4'
  - title: API REST sans authentification — exposition de la topologie
    severity: high
    category: misconfiguration
    owasp_iot: I3 - Insecure Ecosystem Interfaces
    mitre_ics: Discovery, Collection
    description: Endpoints /api/devices et /api/status exposent la liste des devices
      du réseau et les connexions actives, sans token ni authentification. Facilite
      la reconnaissance du réseau interne depuis n'importe quelle IP.
    indicators:
    - Port 80/tcp ouvert
    - GET /api/devices retourne la liste des équipements connectés
    - GET /api/status retourne les connexions internes actives
    verification: curl http://{ip}/api/devices
    confidence_required: medium
    scenarios:
    - '6'
  - title: Interface HTTP admin sans authentification — exposition topologie réseau
    severity: high
    category: misconfiguration
    owasp_iot: I3 - Insecure Ecosystem Interfaces
    mitre_ics: Discovery, Collection
    description: nginx exposé sur port 80 avec /admin accessible sans authentification.
      L'endpoint /api/devices retourne la liste des services edge et cloud. L'endpoint
      /api/status expose les connexions MQTT et DB actives.
    indicators:
    - Port 80/tcp ouvert
    - GET /admin retourne 200 sans login
    - GET /api/devices expose les IPs edge et cloud
    - GET /api/status expose les connexions internes actives
    verification: curl http://{ip}/api/devices
    confidence_required: medium
    scenarios:
    - '7'
  mqtt_broker:
  - title: MQTT sans authentification
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Mosquitto configuré avec allow_anonymous true. N'importe qui peut
      publier ou s'abonner à tous les topics, y compris smartcity/admin/credentials
      qui contient des credentials en clair.
    indicators:
    - Port 1883/tcp ouvert et accessible
    - Connexion possible sans username/password
    - Topic smartcity/admin/credentials expose db_pass et api_key
    verification: mosquitto_sub -h {ip} -t '#' -v
    confidence_required: high
    scenarios:
    - '1'
    - '2'
    - '4'
  - title: MQTT WebSocket exposé sans authentification (port 9001)
    severity: high
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: Initial Access, Collection
    description: Mosquitto expose un listener WebSocket sur le port 9001 en plus du
      TCP 1883. Un attaquant peut interagir avec le broker depuis un navigateur web,
      contournant les firewalls qui filtrent uniquement le port 1883.
    indicators:
    - Port 9001/tcp ouvert
    - Upgrade WebSocket accepté sans authentification
    verification: 'curl -i -N -H ''Connection: Upgrade'' -H ''Upgrade: websocket''
      http://{ip}:9001/'
    confidence_required: medium
    scenarios:
    - '1'
    - '6'
  - title: MQTT sans authentification (RPi5)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: 'Mosquitto sur le RPi5 (simulé) avec allow_anonymous true. Simule
      la configuration réelle du RPi5 du lab NATO. Topics actifs : capteurs T°, humidité,
      accès bâtiment, caméras.'
    indicators:
    - Port 1883/tcp ouvert sur {ip}
    - Connexion anonyme acceptée
    - Topics smartcity/# publiés en continu (données capteurs)
    - Topic smartcity/admin/credentials expose des secrets
    verification: mosquitto_sub -h {ip} -t '#' -v
    confidence_required: high
    scenarios:
    - '3'
  - title: MQTT sans authentification (IoT Hub)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Second broker MQTT anonyme. Simule l'IoT Hub du lab. Même vulnérabilité
      que V5 mais sur un device distinct.
    indicators:
    - Port 1883/tcp ouvert sur {ip}
    - Connexion anonyme acceptée
    verification: mosquitto_sub -h {ip} -t '#' -v
    confidence_required: high
    scenarios:
    - '3'
  - title: MQTT sans authentification — données bâtiment exposées
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: T0830 - Man in the Middle, Collection
    description: Mosquitto avec allow_anonymous true. Les topics MQTT transportent
      les données de surveillance du bâtiment (caméras, accès, HVAC, alarmes) et le
      topic admin/credentials expose les credentials en clair.
    indicators:
    - Port 1883/tcp ouvert
    - Connexion possible sans username/password
    - Topics building/* exposent statut caméras, accès, HVAC
    - Topic smartcity/admin/credentials expose db_pass et api_key
    verification: mosquitto_sub -h {ip} -t '#' -v
    confidence_required: high
    scenarios:
    - '5'
  - title: MQTT sans authentification (allow_anonymous true)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Mosquitto configuré avec allow_anonymous true, sans ACL. Accès en
      lecture/écriture à tous les topics depuis tout le réseau.
    indicators:
    - Port 1883/tcp ouvert
    - Connexion anonyme acceptée sans credentials
    - 'Subscribe # retourne tous les messages'
    verification: mosquitto_sub -h {ip} -t '#' -v
    confidence_required: high
    scenarios:
    - '6'
  - title: MQTT sans authentification (allow_anonymous)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Mosquitto configuré avec allow_anonymous true. N'importe qui peut
      publier ou s'abonner à tous les topics du broker edge.
    indicators:
    - Port 1883/tcp ouvert
    - Connexion possible sans username/password
    verification: mosquitto_sub -h {ip} -t '#' -v -C 3
    confidence_required: high
    scenarios:
    - '7'
  - title: MQTT sans authentification (nœud mesh 1)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Mosquitto configuré avec allow_anonymous true. Nœud mesh exposant
      tous les topics IoT du secteur Nord sans contrôle d'accès.
    indicators:
    - Port 1883/tcp ouvert
    - Connexion possible sans username/password
    - Topics smartcity/admin/credentials accessibles
    verification: mosquitto_sub -h {ip} -t '#' -v -C 3
    confidence_required: high
    scenarios:
    - '9'
  - title: MQTT sans authentification (nœud mesh 3)
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak Passwords / I9 - Insecure Default Settings
    mitre_ics: Initial Access, Collection
    description: Troisième nœud mesh avec allow_anonymous true. Accès complet aux
      topics sans contrôle. Créé un réseau entièrement ouvert par effet de chaîne.
    indicators:
    - Port 1883/tcp ouvert
    - Connexion possible sans username/password
    verification: mosquitto_sub -h {ip} -t '#' -v -C 3
    confidence_required: high
    scenarios:
    - '9'
  router:
  - title: Telnet activé sur le routeur (port 23)
    severity: medium
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: Initial Access
    description: Le service telnetd est actif sur le routeur OpenWrt. Telnet transmet
      les credentials en clair sur le réseau.
    indicators:
    - Port 23/tcp ouvert sur {ip}
    - Connexion telnet possible sans authentification (OpenWrt par défaut)
    verification: nmap -p 23 {ip}
    confidence_required: medium
    scenarios:
    - '1'
    - '10'
    - '2'
    - '3'
    - '6'
    - '7'
    - '8'
    - '9'
  - title: FTP anonymous activé sur le routeur (port 21)
    severity: medium
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: Initial Access
    description: vsftpd configuré sur OpenWrt avec anonymous_enable=YES. Permet l'accès
      en lecture à des fichiers potentiellement sensibles.
    indicators:
    - Port 21/tcp ouvert sur {ip}
    - Connexion FTP anonyme acceptée
    verification: 'ftp {ip} (user: anonymous)'
    confidence_required: medium
    scenarios:
    - '10'
  - title: Interface web admin OpenWrt accessible depuis le WAN
    severity: critical
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services / I3 - Insecure Ecosystem Interfaces
    mitre_ics: Initial Access
    description: uhttpd est configuré pour écouter sur 0.0.0.0:80, rendant l'interface
      LuCI accessible depuis le WAN (port 80). Pas d'authentification supplémentaire.
    indicators:
    - Port 80/tcp ouvert sur l'IP WAN du routeur
    - Interface LuCI accessible sans restriction réseau
    verification: curl http://<WAN_IP>:80 → LuCI login page
    confidence_required: high
    scenarios:
    - '2'
    - '6'
    - '8'
  - title: FTP anonyme activé sur le routeur (port 21)
    severity: medium
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: Initial Access, Collection
    description: vsftpd installé avec anonymous_enable=YES. Permet la connexion FTP
      sans credentials, accès potentiel aux fichiers de configuration.
    indicators:
    - Port 21/tcp ouvert sur {ip}
    - Connexion FTP anonyme acceptée
    verification: 'ftp {ip} (user: anonymous)'
    confidence_required: medium
    scenarios:
    - '3'
  - title: Telnet activé + interface web admin exposée WAN
    severity: medium
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: Initial Access
    description: Le routeur OpenWrt expose Telnet (port 23) en clair et son interface
      web LuCI est accessible depuis le WAN (port 80).
    indicators:
    - Port 23/tcp ouvert (Telnet)
    - Port 80/tcp ouvert sur WAN (interface LuCI)
    verification: nmap -p 23,80 {ip}
    confidence_required: medium
    scenarios:
    - '4'
    - '5'
  - title: Absence de segmentation réseau IT/OT — réseau plat (F5)
    severity: critical
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services
    mitre_ics: T0817 - Drive-by Compromise, Lateral Movement
    description: Tous les équipements IT (admin, webapp, mqtt) et OT (PLC, HMI, Historian)
      partagent le même sous-réseau 192.168.100.0/24 sans aucune règle de firewall
      inter-zone. Un attaquant ayant accès à n'importe quel device IT peut directement
      atteindre le PLC et l'HMI SCADA sans traverser de contrôle d'accès réseau.
    indicators:
    - Tous les devices IT et OT répondent sur 192.168.100.0/24
    - Pas de firewall entre le segment admin (100.11) et le PLC (100.15)
    - nmap -sn 192.168.100.0/24 découvre IT et OT dans la même plage
    verification: nmap -sn 192.168.100.0/24 | grep -E '100\.1[0-9]'
    confidence_required: medium
    scenarios:
    - '4'
  - title: Interface web admin OpenWrt accessible depuis le WAN (port 80)
    severity: critical
    category: misconfiguration
    owasp_iot: I2 - Insecure Network Services / I3 - Insecure Ecosystem Interfaces
    mitre_ics: Initial Access
    description: uhttpd configuré pour écouter sur 0.0.0.0:80. L'interface LuCI est
      accessible depuis le WAN sans restriction réseau, permettant la reconfiguration
      complète du routeur edge et l'exposition de tous les services internes.
    indicators:
    - Port 80/tcp ouvert sur l'IP WAN du routeur
    - Interface LuCI accessible sans restriction réseau
    verification: curl http://{ip}:80
    confidence_required: high
    scenarios:
    - '7'
  ssh_server_v2:
  - title: Clé privée SSH accessible en lecture par tous les utilisateurs
    severity: high
    category: misconfiguration
    owasp_iot: I1 - Weak/Hardcoded Passwords
    mitre_ics: Initial Access, Lateral Movement
    description: Le serveur SSH utilise l'authentification par clé uniquement, mais
      la clé privée ed25519 de l'utilisateur iot-admin est en mode 644 (world-readable).
    indicators:
    - Port 22/tcp ouvert
    - /home/iot-admin/.ssh/id_ed25519 en mode 644
    - PasswordAuthentication no
    verification: ls -la /home/iot-admin/.ssh/
    confidence_required: high
    scenarios:
    - '10'
    - '8'
  web_server:
  - title: Directory listing activé (nginx autoindex on)
    severity: medium
    category: misconfiguration
    owasp_iot: I7 - Insecure Data Transfer and Storage
    mitre_ics: Collection
    description: nginx configuré avec autoindex on. Le répertoire /backup/ expose
      un dump SQL avec des credentials en clair. /config/app.config expose l'API key,
      le mot de passe DB et les credentials SMTP.
    indicators:
    - Port 80/tcp ouvert
    - GET /backup/ retourne un listing de fichiers
    - GET /backup/db_backup_2024-01-15.sql accessible sans auth
    - GET /config/app.config expose des credentials
    verification: curl http://{ip}/backup/
    confidence_required: medium
    scenarios:
    - '1'
    - '2'
    - '3'
    - '5'
    - '6'
