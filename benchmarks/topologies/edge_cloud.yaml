id: edge_cloud
name: Edge-Cloud pivot
description: Architecture distribuee edge gateway + cloud API
base_vmid: 170
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 10.70.0.1
services:
- name_template: s{sid}-edge-gw
  vmid_offset: 1
  ip: 10.70.0.11
  role: iot_gateway
- name_template: s{sid}-edge-mqtt
  vmid_offset: 2
  ip: 10.70.0.12
  role: mqtt_broker
- name_template: s{sid}-edge-compute
  vmid_offset: 3
  ip: 10.70.0.13
  role: ssh_server
- name_template: s{sid}-cloud-api
  vmid_offset: 4
  ip: 10.70.0.14
  role: web_upload
- name_template: s{sid}-cloud-db
  vmid_offset: 5
  ip: 10.70.0.15
  role: db_server
