id: nato_lab
name: Réplique NATO Lab
description: Replique du lab NATO physique, 7-8 devices multi-protocoles
base_vmid: 120
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 192.168.100.1
services:
- name_template: s{sid}-wisgate
  vmid_offset: 1
  ip: 192.168.100.11
  role: iot_gateway
- name_template: s{sid}-rpi5
  vmid_offset: 2
  ip: 192.168.100.12
  role: mqtt_broker
- name_template: s{sid}-iot-hub
  vmid_offset: 3
  ip: 192.168.100.13
  role: mqtt_broker
- name_template: s{sid}-jetson
  vmid_offset: 4
  ip: 192.168.100.14
  role: ssh_server
- name_template: s{sid}-ap
  vmid_offset: 5
  ip: 192.168.100.15
  role: web_server
- name_template: s{sid}-cam
  vmid_offset: 6
  ip: 192.168.100.16
  role: web_server
- name_template: s{sid}-nvr
  vmid_offset: 7
  ip: 192.168.100.17
  role: nvr_server
