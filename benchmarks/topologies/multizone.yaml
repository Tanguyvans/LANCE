id: multizone
name: Multi-zone IT/IoT/OT
description: Multi-zone IT/IoT/OT avec variantes de roles
base_vmid: 180
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 192.168.100.1
services:
- name_template: s{sid}-admin
  vmid_offset: 1
  ip: 192.168.100.11
  role: ssh_server_v2
- name_template: s{sid}-mqtt
  vmid_offset: 2
  ip: 192.168.100.12
  role: mqtt_broker_v2
- name_template: s{sid}-iot-gw
  vmid_offset: 3
  ip: 192.168.100.13
  role: iot_gateway
- name_template: s{sid}-plc
  vmid_offset: 4
  ip: 192.168.100.14
  role: modbus_server
- name_template: s{sid}-hmi
  vmid_offset: 5
  ip: 192.168.100.15
  role: web_server_v2
- name_template: s{sid}-redis
  vmid_offset: 6
  ip: 192.168.100.16
  role: db_server_v2
- name_template: s{sid}-historian
  vmid_offset: 7
  ip: 192.168.100.17
  role: db_server
