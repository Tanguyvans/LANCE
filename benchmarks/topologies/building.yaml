id: building
name: Smart Building
description: 'Smart building : cameras, NVR, HVAC, controle d''acces'
base_vmid: 150
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 10.50.0.1
services:
- name_template: s{sid}-cam1
  vmid_offset: 1
  ip: 10.50.0.11
  role: camera_server
- name_template: s{sid}-cam2
  vmid_offset: 2
  ip: 10.50.0.12
  role: camera_server
- name_template: s{sid}-nvr
  vmid_offset: 3
  ip: 10.50.0.13
  role: nvr_server
- name_template: s{sid}-access-ctrl
  vmid_offset: 4
  ip: 10.50.0.14
  role: web_server
- name_template: s{sid}-hvac
  vmid_offset: 5
  ip: 10.50.0.15
  role: web_server
- name_template: s{sid}-mqtt
  vmid_offset: 6
  ip: 10.50.0.16
  role: mqtt_broker
- name_template: s{sid}-web
  vmid_offset: 7
  ip: 10.50.0.17
  role: web_server
