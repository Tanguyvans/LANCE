id: gateway
name: Gateway exposée
description: Gateway IoT exposee comme point d'entree, 5-6 devices
base_vmid: 110
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 10.20.0.1
services:
- name_template: s{sid}-web
  vmid_offset: 1
  ip: 10.20.0.11
  role: web_server
- name_template: s{sid}-mqtt
  vmid_offset: 2
  ip: 10.20.0.12
  role: mqtt_broker
- name_template: s{sid}-iot-gw
  vmid_offset: 3
  ip: 10.20.0.13
  role: iot_gateway
- name_template: s{sid}-db
  vmid_offset: 4
  ip: 10.20.0.14
  role: db_server
- name_template: s{sid}-jump
  vmid_offset: 5
  ip: 10.20.0.15
  role: ssh_server
