id: flat
name: Réseau plat
description: Reseau IoT sans segmentation, 3-4 devices sur 1 subnet
base_vmid: 100
router:
  name_template: s{sid}-router
  type: openwrt
  ip: 192.168.100.1
services:
- name_template: s{sid}-mqtt
  vmid_offset: 1
  ip: 192.168.100.11
  role: mqtt_broker
- name_template: s{sid}-web
  vmid_offset: 2
  ip: 192.168.100.12
  role: web_server
- name_template: s{sid}-ssh
  vmid_offset: 3
  ip: 192.168.100.13
  role: ssh_server
