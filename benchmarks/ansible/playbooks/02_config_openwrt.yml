# 02_config_openwrt.yml — Configuration du template OpenWrt
# Usage : ansible-playbook -i inventory.yml playbooks/02_config_openwrt.yml --ask-vault-pass
#
# Ce que fait ce playbook :
#   1. Retire l'IP 192.168.100.1 de vmbr1 sur Proxmox (conflit avec OpenWrt LAN)
#   2. Ajoute une IP temporaire 192.168.1.100/24 sur vmbr1 pour joindre OpenWrt
#   3. Clone et démarre le template OpenWrt (9001 → 9010)
#   4. Configure OpenWrt via SSH (LAN=192.168.100.1, SSH WAN autorisé, NAT)
#   5. Retire l'IP temporaire de vmbr1
#   6. Arrête la VM, remplace le template 9001 par la version configurée
#
# Après ce playbook :
#   - tpl-openwrt (9001) est configuré avec LAN=192.168.100.1 et SSH WAN activé
#   - vmbr1 est un bridge pur sans IP sur Proxmox
#   - OpenWrt est joignable via son IP WAN (DHCP sur 192.168.88.x)

- name: "Étape 1 — Préparer Proxmox"
  hosts: proxmox
  gather_facts: false

  vars:
    openwrt_raw_vmid: 9001        # VMID du template brut créé par 01_create_templates.yml
    openwrt_tmp_vmid: 9010        # VMID de travail et du template final configuré
    openwrt_tmp_name: openwrt-config-tmp
    openwrt_default_lan: "192.168.1.1"
    openwrt_tmp_proxy_ip: "192.168.1.100"

  tasks:

    - name: Retirer l'IP 192.168.100.1 de vmbr1 (passer à inet manual)
      ansible.builtin.blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED - vmbr1 benchmark"
        block: |
          auto vmbr1
          iface vmbr1 inet manual
              bridge-ports none
              bridge-stp off
              bridge-fd 0
              # Bridge interne pour les VMs benchmark (pas de NIC physique)

    - name: Appliquer la nouvelle config vmbr1 (sans IP)
      ansible.builtin.command: ifreload -a
      changed_when: true

    - name: Supprimer manuellement l'IP résiduelle sur vmbr1 si encore présente
      ansible.builtin.command: ip addr del 192.168.100.1/24 dev vmbr1
      failed_when: false
      changed_when: true

    # NOTE: ce Proxmox a son management vmbr0 sur 192.168.1.0/24. On ajoute donc
    # l'IP en /32 (aucune route /24 concurrente) + une route hôte /32 vers OpenWrt
    # scopée sur vmbr1, pour ne PAS détourner le routage de vmbr0 (gateway/Tailscale).
    - name: Ajouter IP temporaire 192.168.1.100/32 sur vmbr1 (sans route /24 — évite le conflit avec vmbr0)
      ansible.builtin.command: ip addr add {{ openwrt_tmp_proxy_ip }}/32 dev vmbr1
      failed_when: false
      changed_when: true

    - name: Router uniquement 192.168.1.1 (OpenWrt) via vmbr1 — route hôte /32 prioritaire
      ansible.builtin.command: ip route replace {{ openwrt_default_lan }}/32 dev vmbr1 src {{ openwrt_tmp_proxy_ip }}
      changed_when: true

    - name: Détruire la VM temporaire 9010 si elle existe déjà (nettoyage)
      block:
        - ansible.builtin.command: qm stop {{ openwrt_tmp_vmid }} --skiplock
          failed_when: false
        - ansible.builtin.command: qm destroy {{ openwrt_tmp_vmid }} --purge
          failed_when: false

    - name: Cloner le template OpenWrt brut (9001) vers une VM temporaire (9010)
      ansible.builtin.command: >-
        qm clone {{ openwrt_raw_vmid }} {{ openwrt_tmp_vmid }}
        --name {{ openwrt_tmp_name }}
        --full

    - name: Démarrer la VM OpenWrt temporaire
      ansible.builtin.command: qm start {{ openwrt_tmp_vmid }}

    - name: Attendre que OpenWrt soit prêt (SSH sur 192.168.1.1)
      ansible.builtin.wait_for:
        host: "{{ openwrt_default_lan }}"
        port: 22
        timeout: 90
        delay: 15


- name: "Étape 2 — Configurer OpenWrt via SSH depuis Proxmox"
  hosts: proxmox
  gather_facts: false

  vars:
    openwrt_default_lan: "192.168.1.1"
    openwrt_lan_ip: "192.168.100.1"
    openwrt_lan_mask: "255.255.255.0"

  tasks:

    - name: Configurer le LAN OpenWrt (192.168.100.1)
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@{{ openwrt_default_lan }} '
        uci set network.lan.ipaddr="{{ openwrt_lan_ip }}"
        uci set network.lan.netmask="{{ openwrt_lan_mask }}"
        uci commit network
        '
      changed_when: true

    - name: Autoriser SSH sur l'interface WAN
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@{{ openwrt_default_lan }} '
        uci add firewall rule
        uci set firewall.@rule[-1].name="Allow-SSH-WAN"
        uci set firewall.@rule[-1].src="wan"
        uci set firewall.@rule[-1].dest_port="22"
        uci set firewall.@rule[-1].proto="tcp"
        uci set firewall.@rule[-1].target="ACCEPT"
        uci commit firewall
        '
      changed_when: true

    - name: Vérifier que le masquerade NAT est actif (devrait l'être par défaut)
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@{{ openwrt_default_lan }} '
        uci show firewall | grep masq
        '
      register: masq_check
      changed_when: false
      failed_when: false

    - name: Activer le masquerade NAT si absent
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@{{ openwrt_default_lan }} '
        uci set firewall.@zone[1].masq="1"
        uci commit firewall
        '
      when: "'masq=1' not in masq_check.stdout"
      changed_when: true

    - name: Redémarrer le réseau et le firewall OpenWrt (en arrière-plan pour éviter le hang)
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o ServerAliveInterval=5 -o ServerAliveCountMax=1 \
            root@{{ openwrt_default_lan }} \
            'nohup sh -c "/etc/init.d/network restart && /etc/init.d/firewall restart" >/dev/null 2>&1 &'
      changed_when: true
      failed_when: false


- name: "Étape 3 — Finaliser le template sur Proxmox"
  hosts: proxmox
  gather_facts: false

  vars:
    openwrt_raw_vmid: 9001        # défini ici aussi : les vars: sont scopées par play
    openwrt_tmp_vmid: 9010
    openwrt_tmp_proxy_ip: "192.168.1.100"
    openwrt_lan_ip: "192.168.100.1"

  tasks:

    - name: Retirer la route hôte temporaire vers OpenWrt (192.168.1.1)
      ansible.builtin.command: ip route del 192.168.1.1/32 dev vmbr1
      failed_when: false
      changed_when: true

    - name: Retirer l'IP temporaire 192.168.1.100 de vmbr1
      ansible.builtin.command: ip addr del {{ openwrt_tmp_proxy_ip }}/32 dev vmbr1
      failed_when: false
      changed_when: true

    - name: Attendre que OpenWrt finisse son redémarrage réseau
      ansible.builtin.pause:
        seconds: 20

    - name: Arrêter la VM OpenWrt configurée
      ansible.builtin.command: qm stop {{ openwrt_tmp_vmid }}

    - name: Supprimer l'ancien template brut (9001)
      ansible.builtin.command: qm destroy {{ openwrt_raw_vmid }} --purge

    - name: Renommer la VM configurée en tpl-openwrt
      ansible.builtin.command: qm set {{ openwrt_tmp_vmid }} --name tpl-openwrt

    - name: Convertir en template (nouveau 9001)
      ansible.builtin.command: qm template {{ openwrt_tmp_vmid }}

    - name: Mettre à jour tpl_openwrt_vmid dans group_vars/all/main.yml (→ 9010)
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../group_vars/all/main.yml"
        regexp: "^tpl_openwrt_vmid:.*"
        replace: "tpl_openwrt_vmid: {{ openwrt_tmp_vmid }}   # KVM — OpenWrt x86-64 configuré (LAN=192.168.100.1)"
      delegate_to: localhost
      failed_when: false

    - name: Résumé
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          Template OpenWrt configuré (VMID {{ openwrt_tmp_vmid }}) :
            LAN  : 192.168.100.1/24 (vmbr1)
            WAN  : DHCP (vmbr0, réseau 192.168.88.x)
            SSH  : autorisé sur WAN
            NAT  : actif
          vmbr1 sur Proxmox : bridge pur, sans IP
          ══════════════════════════════════════════════════════
