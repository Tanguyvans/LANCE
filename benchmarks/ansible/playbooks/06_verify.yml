# 06_verify.yml — Vérification que toutes les vulnérabilités sont actives
# Usage : ansible-playbook -i inventory.yml playbooks/06_verify.yml \
#           --ask-vault-pass --extra-vars "scenario_id=1"
#
# Pour chaque vulnérabilité injectée, ce playbook vérifie que :
#   - Les ports attendus sont ouverts
#   - Les services acceptent les connexions non authentifiées
#   - Les fichiers sensibles sont accessibles
#
# Résultat : tableau récapitulatif avec OK / FAIL par vulnérabilité

- name: Vérification des vulnérabilités — Scénario {{ scenario_id | default('?') }}
  hosts: proxmox
  gather_facts: false

  vars:
    scenario_id: "1"
    base_vmid: "{{ scenario_vmid_ranges[scenario_id] | int }}"
    # scenarios est défini dans group_vars/all.yml (source unique de vérité)

  tasks:

    - name: Vérifier que le scénario est défini
      ansible.builtin.fail:
        msg: "scenario_id={{ scenario_id }} non défini. Valeurs valides : 1, 2, 3, 4, 5, 6, 7"
      when: scenario_id not in scenarios

    # ── Ajouter IP temporaire pour accès aux CTs via vmbr1 ──
    - name: Ajouter IP temporaire 192.168.100.254 sur vmbr1
      ansible.builtin.command: ip addr add 192.168.100.254/24 dev vmbr1
      failed_when: false
      changed_when: true


    # ════════════════════════════════════════════════════
    # VÉRIFICATIONS PAR RÔLE
    # ════════════════════════════════════════════════════

    # ── MQTT : connexion anonyme ──
    - name: "[mqtt_broker] Vérifier port 1883 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':1883' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'mqtt_broker'
      register: mqtt_port_check
      changed_when: false

    - name: "[mqtt_broker] Vérifier allow_anonymous dans la config"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "grep -r 'allow_anonymous true' /etc/mosquitto/ && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'mqtt_broker'
      register: mqtt_anon_check
      changed_when: false

    - name: "[mqtt_broker] Tester connexion anonyme réelle (publish retained + subscribe)"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "mosquitto_pub -h 127.0.0.1 -t 'verify/test' -m 'ok' -r 2>&1 &&
                 mosquitto_sub -h 127.0.0.1 -t 'verify/test' -C 1 -W 3 2>&1 | grep -q 'ok' &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'mqtt_broker'
      register: mqtt_conn_check
      changed_when: false
      failed_when: false

    # ── Web : directory listing ──
    - name: "[web_server] Vérifier port 80 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':80' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_server'
      register: web_port_check
      changed_when: false

    - name: "[web_server] Vérifier autoindex on dans nginx"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "grep -r 'autoindex on' /etc/nginx/ && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_server'
      register: web_autoindex_check
      changed_when: false

    - name: "[web_server] Vérifier accès au fichier sensible /backup/"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "curl -s http://127.0.0.1/backup/ | grep -qi 'db_backup\|config\|Index' &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_server'
      register: web_listing_check
      changed_when: false
      failed_when: false

    # ── SSH : creds par défaut ──
    - name: "[ssh_server] Vérifier port 22 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':22' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ssh_server'
      register: ssh_port_check
      changed_when: false

    - name: "[ssh_server] Vérifier PasswordAuthentication yes"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "grep -i 'PasswordAuthentication yes' /etc/ssh/sshd_config && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ssh_server'
      register: ssh_pwauth_check
      changed_when: false

    - name: "[ssh_server] Vérifier existence user admin (compte configuré)"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "id admin &>/dev/null && getent shadow admin | cut -d: -f2 | grep -qv '!' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ssh_server'
      register: ssh_creds_check
      changed_when: false
      failed_when: false

    # ── IoT Gateway : Dropbear + HTTP ──
    - name: "[iot_gateway] Vérifier Dropbear ou SSH sur port 22"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':22' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'iot_gateway'
      register: iotgw_ssh_check
      changed_when: false

    - name: "[iot_gateway] Vérifier version Dropbear (Terrapin)"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "dropbear -V 2>&1 | head -1; echo OK"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'iot_gateway'
      register: iotgw_dropbear_version
      changed_when: false
      failed_when: false

    - name: "[iot_gateway] Vérifier endpoint /admin sans auth"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "curl -s http://127.0.0.1/admin | grep -qi 'admin\|no auth' &&
                 curl -s http://127.0.0.1/api/status | grep -qi 'connections\|mqtt\|db' &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'iot_gateway'
      register: iotgw_http_check
      changed_when: false
      failed_when: false

    # ── DB : root sans mot de passe ──
    - name: "[db_server] Vérifier port 3306 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':3306' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'db_server'
      register: db_port_check
      changed_when: false

    - name: "[db_server] Vérifier connexion root sans mot de passe"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "mysql -u root -e 'SELECT 1' &>/dev/null && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'db_server'
      register: db_nopass_check
      changed_when: false

    - name: "[db_server] Vérifier table users avec passwords en clair"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "mysql -u root -e 'SHOW DATABASES' 2>/dev/null | grep -q 'smartcity' &&
                 mysql -u root -e 'SELECT COUNT(*) FROM smartcity.users' 2>/dev/null | grep -q '[0-9]' &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'db_server'
      register: db_data_check
      changed_when: false
      failed_when: false

    # ── Modbus : port 502 sans auth ──
    - name: "[modbus_server] Vérifier port 502 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':502' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'modbus_server'
      register: modbus_port_check
      changed_when: false
      failed_when: false

    - name: "[modbus_server] Vérifier processus modbus actif"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "systemctl is-active modbus 2>/dev/null && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'modbus_server'
      register: modbus_svc_check
      changed_when: false
      failed_when: false

    # ── Web Upload : PHP upload sans validation ──
    - name: "[web_upload] Vérifier port 80 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':80' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_upload'
      register: webupload_port_check
      changed_when: false

    - name: "[web_upload] Vérifier que PHP-FPM répond et que l'upload est accessible"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "curl -s http://127.0.0.1/index.php | grep -qi 'upload\|firmware' &&
                 [ -d /var/www/html/uploads ] && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_upload'
      register: webupload_shell_check
      changed_when: false
      failed_when: false

    # ── Camera Server : HTTP sans auth ──
    - name: "[camera_server] Vérifier port 80 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':80' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'camera_server'
      register: camera_port_check
      changed_when: false

    - name: "[camera_server] Vérifier accès /admin sans auth"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "curl -s http://127.0.0.1/admin | grep -qi 'admin' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'camera_server'
      register: camera_admin_check
      changed_when: false
      failed_when: false

    # ── NVR Server : ubnt/ubnt ──
    - name: "[nvr_server] Vérifier port 22 ouvert"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "ss -tlnp | grep -q ':22' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'nvr_server'
      register: nvr_port_check
      changed_when: false

    - name: "[nvr_server] Vérifier existence user ubnt (compte configuré)"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "id ubnt &>/dev/null && getent shadow ubnt | cut -d: -f2 | grep -qv '!' && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'nvr_server'
      register: nvr_creds_check
      changed_when: false
      failed_when: false

    - name: "[nvr_server] Vérifier config NVR avec credentials exposés"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "[ -f /opt/nvr/config/system.json ] && grep -q 'ubnt' /opt/nvr/config/system.json && echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'nvr_server'
      register: nvr_config_check
      changed_when: false
      failed_when: false

    # ── S7 : Bridge MQTT config avec credentials ──
    - name: "[mqtt_broker / S7] Vérifier bridge.conf avec credentials exposés"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "[ -f /etc/mosquitto/conf.d/bridge.conf ] &&
                 grep -q 'bridge_password' /etc/mosquitto/conf.d/bridge.conf &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: scenario_id == "7" and item.role == 'mqtt_broker'
      register: s7_bridge_check
      changed_when: false
      failed_when: false

    # ── S7 : Backup SQL cloud exposé ──
    - name: "[web_upload / S7] Vérifier backup cloud_db_backup.sql accessible"
      ansible.builtin.shell: >
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        bash -c "[ -f /var/www/html/backup/cloud_db_backup.sql ] &&
                 curl -s http://127.0.0.1/backup/cloud_db_backup.sql | grep -qi 'INSERT INTO users' &&
                 echo OK || echo FAIL"
      loop: "{{ scenarios[scenario_id].services }}"
      when: scenario_id == "7" and item.role == 'web_upload'
      register: s7_backup_check
      changed_when: false
      failed_when: false

    # ── Router : Telnet + FTP ──
    - name: "[router] Vérifier port Telnet (23)"
      ansible.builtin.shell: >
        nmap -p 23 --open {{ benchmark_gateway }} 2>/dev/null | grep -q '23/tcp open' &&
        echo OK || echo FAIL
      register: router_telnet_check
      changed_when: false
      failed_when: false

    - name: "[router] Vérifier port FTP (21) — scénario 3 uniquement"
      ansible.builtin.shell: >
        nmap -p 21 --open {{ benchmark_gateway }} 2>/dev/null | grep -q '21/tcp open' &&
        echo OK || echo FAIL
      register: router_ftp_check
      changed_when: false
      failed_when: false
      when: scenario_id == "3"

    - name: "[router] Vérifier interface web admin sur WAN (80) — scénarios 2/4/5/6/7"
      ansible.builtin.shell: >
        nmap -p 80 --open {{ benchmark_gateway }} 2>/dev/null | grep -q '80/tcp open' &&
        echo OK || echo FAIL
      register: router_wan_check
      changed_when: false
      failed_when: false
      when: scenario_id in ["2", "4", "5", "6", "7"]


    # ── Retirer IP temporaire ──
    - name: Retirer l'IP temporaire de vmbr1
      ansible.builtin.command: ip addr del 192.168.100.254/24 dev vmbr1
      failed_when: false
      changed_when: true


    # ════════════════════════════════════════════════════
    # RAPPORT FINAL
    # ════════════════════════════════════════════════════

    - name: Rapport de vérification
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════════════════
          Rapport de vérification — Scénario S{{ scenario_id }}
          ══════════════════════════════════════════════════════════════════

          MQTT (allow_anonymous + port 1883)
          {% for r in (mqtt_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 1883  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (mqtt_anon_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            allow_anon : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (mqtt_conn_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Connexion  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          Web Server (nginx autoindex + fichiers exposés)
          {% for r in (web_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 80    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (web_autoindex_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            autoindex  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (web_listing_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            /backup/   : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          SSH Server (admin/admin + PasswordAuth)
          {% for r in (ssh_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 22    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (ssh_pwauth_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            PwdAuth    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (ssh_creds_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            admin:admin: {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          IoT Gateway (Dropbear + HTTP sans auth)
          {% for r in (iotgw_ssh_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 22    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (iotgw_dropbear_version.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Dropbear   : {{ r.stdout_lines[0] | default('?') }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (iotgw_http_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            /admin     : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          DB Server (root sans password + bind 0.0.0.0)
          {% for r in (db_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 3306  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (db_nopass_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            root/vide  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (db_data_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            users table: {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          Modbus Server (port 502 sans auth)
          {% for r in (modbus_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 502   : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (modbus_svc_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Service    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          Web Upload (PHP sans validation)
          {% for r in (webupload_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 80    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (webupload_shell_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            PHP upload : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          Camera Server (HTTP sans auth)
          {% for r in (camera_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 80    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (camera_admin_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            /admin     : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          NVR Server (ubnt/ubnt)
          {% for r in (nvr_port_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            Port 22    : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (nvr_creds_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            ubnt:ubnt  : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (nvr_config_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            config.json: {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          {% if scenario_id == "7" %}
          S7 — Spécifiques Edge-Cloud
          {% for r in (s7_bridge_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            bridge.conf: {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}
          {% for r in (s7_backup_check.results | default([])) %}
          {% if not r.skipped | default(false) %}
            backup SQL : {{ '✓ OK' if 'OK' in r.stdout else '✗ FAIL' }}  [{{ r.item.name }}]
          {% endif %}
          {% endfor %}

          {% endif %}
          Router OpenWrt
            Telnet (23) : {{ '✓ OK' if 'OK' in router_telnet_check.stdout else '✗ FAIL' }}
          {% if scenario_id in ["2", "4", "5", "6", "7"] %}
            Web WAN (80): {{ '✓ OK' if 'OK' in (router_wan_check.stdout | default('')) else '✗ FAIL' }}
          {% endif %}
          {% if scenario_id == "3" %}
            FTP (21)    : {{ '✓ OK' if 'OK' in (router_ftp_check.stdout | default('')) else '✗ FAIL' }}
          {% endif %}

          ══════════════════════════════════════════════════════════════════
