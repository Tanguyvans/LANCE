# 99_teardown.yml — Suppression de toutes les VMs d'un scénario
# Usage : ansible-playbook -i inventory.yml playbooks/99_teardown.yml \
#           --ask-vault-pass --extra-vars "scenario_id=1"

- name: Teardown scénario {{ scenario_id | default('?') }}
  hosts: proxmox
  gather_facts: false

  vars:
    scenario_id: "1"
    base_vmid: "{{ scenario_vmid_ranges[scenario_id] | int }}"
    # Plage de 10 VMIDs par scénario (base+0 router, base+1..9 services)
    vmid_range: "{{ range(base_vmid | int, base_vmid | int + 10) | list }}"

  tasks:

    - name: Arrêter toutes les VMs KVM du scénario
      ansible.builtin.command: qm stop {{ item }} --skiplock
      failed_when: false
      loop: "{{ vmid_range }}"

    - name: Supprimer toutes les VMs KVM du scénario
      ansible.builtin.command: qm destroy {{ item }} --purge
      failed_when: false
      loop: "{{ vmid_range }}"

    - name: Arrêter tous les CTs LXC du scénario
      ansible.builtin.command: pct stop {{ item }} --skiplock
      failed_when: false
      loop: "{{ vmid_range }}"

    - name: Supprimer tous les CTs LXC du scénario
      ansible.builtin.command: pct destroy {{ item }}
      failed_when: false
      loop: "{{ vmid_range }}"

    - name: Scénario S{{ scenario_id }} supprimé
      ansible.builtin.debug:
        msg: "Toutes les VMs {{ base_vmid }}–{{ base_vmid | int + 9 }} ont été supprimées."
