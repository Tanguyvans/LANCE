---
# Deploy isolated baseline VM for external pentest agents (CAI, PentGPT, etc.).
#
# Usage:
#   ansible-playbook benchmarks/ansible/playbooks/deploy_baseline_vm.yml \
#     --vault-password-file ~/.vault_pass -i benchmarks/ansible/inventory.yml

- name: Provision LXC baseline VM on Proxmox
  hosts: proxmox
  gather_facts: false

  tasks:
    - name: Check if baseline LXC already exists
      ansible.builtin.command: pct status {{ baseline_vmid }}
      register: baseline_status
      failed_when: false
      changed_when: false

    - name: Create isolated baseline LXC with dual NIC
      ansible.builtin.command: >
        pct create {{ baseline_vmid }}
        /var/lib/vz/template/cache/debian-13-standard_13.1-2_amd64.tar.zst
        --hostname {{ baseline_hostname }}
        --storage {{ baseline_storage }}
        --rootfs {{ baseline_storage }}:{{ baseline_disk_size }}
        --memory {{ baseline_memory }}
        --cores {{ baseline_cores }}
        --password {{ vault_master_root_password }}
        --net0 name=eth0,bridge=vmbr0,ip=dhcp
        --net1 name=eth1,bridge={{ benchmark_bridge }},ip={{ baseline_benchmark_ip }}/24
        --nameserver 1.1.1.1
        --onboot 1
        --unprivileged 1
        --features nesting=1
      when: baseline_status.rc != 0

    - name: Start baseline LXC
      ansible.builtin.command: pct start {{ baseline_vmid }}
      register: baseline_start
      failed_when: baseline_start.rc != 0 and 'already running' not in baseline_start.stderr

    - name: Get baseline management IP
      ansible.builtin.command: pct exec {{ baseline_vmid }} -- ip -4 addr show eth0
      register: baseline_ip_raw
      retries: 10
      delay: 3
      until: (baseline_ip_raw.stdout | regex_search('inet (\\d+\\.\\d+\\.\\d+\\.\\d+)')) is not none

    - name: Extract baseline management IP
      ansible.builtin.set_fact:
        baseline_ip: "{{ baseline_ip_raw.stdout | regex_search('inet (\\d+\\.\\d+\\.\\d+\\.\\d+)', '\\1') | first }}"

    - name: Read controller SSH public key
      ansible.builtin.slurp:
        src: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
      delegate_to: localhost
      register: controller_pubkey

    - name: Ensure root SSH directory exists in baseline LXC
      ansible.builtin.command: pct exec {{ baseline_vmid }} -- mkdir -p /root/.ssh
      changed_when: false

    - name: Install controller SSH public key in baseline LXC
      ansible.builtin.command: pct exec {{ baseline_vmid }} -- tee /root/.ssh/authorized_keys
      args:
        stdin: "{{ controller_pubkey.content | b64decode | trim }}\n"
      changed_when: true

    - name: Fix baseline root SSH permissions
      ansible.builtin.command: >
        pct exec {{ baseline_vmid }} --
        sh -c 'chmod 700 /root/.ssh && chmod 600 /root/.ssh/authorized_keys'
      changed_when: false

    - name: Register baseline host for configuration
      ansible.builtin.add_host:
        name: baseline
        ansible_host: "{{ baseline_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

    - name: Remove stale baseline SSH host key from controller known_hosts
      ansible.builtin.command: ssh-keygen -R {{ baseline_ip }}
      delegate_to: localhost
      register: baseline_known_host_remove
      changed_when: "'Host ' in baseline_known_host_remove.stdout or 'updated original contents' in baseline_known_host_remove.stderr"
      failed_when: false

    - name: Trust current baseline SSH host key on controller
      ansible.builtin.known_hosts:
        name: "{{ baseline_ip }}"
        key: "{{ lookup('pipe', 'ssh-keyscan ' + baseline_ip) }}"
        state: present
      delegate_to: localhost

    - name: Wait for baseline SSH
      ansible.builtin.wait_for:
        host: "{{ baseline_ip }}"
        port: 22
        delay: 5
        timeout: 60

- name: Configure isolated baseline VM
  hosts: baseline
  gather_facts: true

  tasks:
    - name: Set timezone to Europe/Paris
      community.general.timezone:
        name: Europe/Paris

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install baseline system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - jq
          - nmap
          - python3
          - python3-pip
          - python3-venv
          - ssh-audit
          - sshpass
          - netcat-openbsd
          - mosquitto-clients
          - mariadb-client
          - iptables-persistent
        state: present

    - name: Ensure eth1 is configured at boot
      ansible.builtin.copy:
        dest: /etc/network/interfaces.d/eth1
        mode: "0644"
        content: |
          auto eth1
          iface eth1 inet static
            address {{ baseline_benchmark_ip }}
            netmask 255.255.255.0
            # No gateway: benchmark traffic remains local to {{ benchmark_bridge }}

    - name: Bring up eth1
      ansible.builtin.command: ifup eth1
      register: baseline_ifup
      changed_when: baseline_ifup.rc == 0
      failed_when: false

    - name: Flush existing OUTPUT rules
      ansible.builtin.iptables:
        chain: OUTPUT
        flush: true

    - name: Allow loopback output
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: lo
        jump: ACCEPT

    - name: Allow established traffic on management interface
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: eth0
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT

    - name: Allow dependency downloads on management interface
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: eth0
        protocol: tcp
        destination_port: "{{ item }}"
        jump: ACCEPT
      loop:
        - "22"
        - "80"
        - "443"

    - name: Allow DNS on management interface
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: eth0
        protocol: udp
        destination_port: "53"
        jump: ACCEPT

    - name: Block other outbound management traffic
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: eth0
        jump: DROP

    - name: Allow all benchmark traffic on eth1
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: eth1
        jump: ACCEPT

    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true

    - name: Create baseline tool directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/baseline-tools
        - /opt/baseline-tools/adapters
        - /opt/baseline-tools/results
        - /opt/baseline-tools/tools

    - name: Install CAI adapter placeholder
      ansible.builtin.copy:
        dest: /opt/baseline-tools/adapters/cai_run.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=""
          SCENARIO=""
          OUTPUT=""
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --variant) VARIANT="$2"; shift 2 ;;
              --target) TARGET="$2"; shift 2 ;;
              --scope) SCOPE="$2"; shift 2 ;;
              --scenario) SCENARIO="$2"; shift 2 ;;
              --max-turns) MAX_TURNS="$2"; shift 2 ;;
              --model) MODEL="$2"; shift 2 ;;
              --output) OUTPUT="$2"; shift 2 ;;
              *) echo "Unknown argument: $1" >&2; exit 2 ;;
            esac
          done
          mkdir -p "$(dirname "$OUTPUT")"
          cat > "$OUTPUT" <<JSON
          {"tool":"cai","scenario":"$SCENARIO","target":"$TARGET","findings":[],"adapter_status":"placeholder"}
          JSON
          echo "CAI placeholder wrote $OUTPUT. Replace this script with the real CAI invocation." >&2

    - name: Install PentGPT adapter placeholder
      ansible.builtin.copy:
        dest: /opt/baseline-tools/adapters/pentgpt_run.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=""
          SCENARIO=""
          OUTPUT=""
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --target) TARGET="$2"; shift 2 ;;
              --scope) SCOPE="$2"; shift 2 ;;
              --scenario) SCENARIO="$2"; shift 2 ;;
              --max-turns) MAX_TURNS="$2"; shift 2 ;;
              --model) MODEL="$2"; shift 2 ;;
              --output) OUTPUT="$2"; shift 2 ;;
              *) echo "Unknown argument: $1" >&2; exit 2 ;;
            esac
          done
          mkdir -p "$(dirname "$OUTPUT")"
          cat > "$OUTPUT" <<JSON
          {"tool":"pentgpt","scenario":"$SCENARIO","target":"$TARGET","findings":[],"adapter_status":"placeholder"}
          JSON
          echo "PentGPT placeholder wrote $OUTPUT. Replace this script with the real PentGPT invocation." >&2

    - name: Install VulnBot adapter placeholder
      ansible.builtin.copy:
        dest: /opt/baseline-tools/adapters/vulnbot_run.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=""
          SCENARIO=""
          OUTPUT=""
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --target) TARGET="$2"; shift 2 ;;
              --scope) SCOPE="$2"; shift 2 ;;
              --scenario) SCENARIO="$2"; shift 2 ;;
              --max-turns) MAX_TURNS="$2"; shift 2 ;;
              --model) MODEL="$2"; shift 2 ;;
              --output) OUTPUT="$2"; shift 2 ;;
              *) echo "Unknown argument: $1" >&2; exit 2 ;;
            esac
          done
          mkdir -p "$(dirname "$OUTPUT")"
          cat > "$OUTPUT" <<JSON
          {"tool":"vulnbot","scenario":"$SCENARIO","target":"$TARGET","findings":[],"adapter_status":"placeholder"}
          JSON
          echo "VulnBot placeholder wrote $OUTPUT. Replace this script with the real VulnBot invocation." >&2

    - name: Install Nmap NSE adapter
      ansible.builtin.copy:
        dest: /opt/baseline-tools/adapters/nmap_nse_run.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          TARGET=""
          SCENARIO=""
          OUTPUT=""
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --target) TARGET="$2"; shift 2 ;;
              --scope) SCOPE="$2"; shift 2 ;;
              --scenario) SCENARIO="$2"; shift 2 ;;
              --output) OUTPUT="$2"; shift 2 ;;
              *) echo "Unknown argument: $1" >&2; exit 2 ;;
            esac
          done
          mkdir -p "$(dirname "$OUTPUT")"
          RAW="$(mktemp)"
          nmap -sV --script vuln "$TARGET" -oN "$RAW" >/dev/null || true
          python3 - "$TARGET" "$RAW" "$OUTPUT" <<'PY'
          import json, re, sys
          target, raw_path, output = sys.argv[1:]
          text = open(raw_path, encoding="utf-8", errors="ignore").read()
          cves = sorted(set(re.findall(r"CVE-\d{4}-\d{4,}", text, re.I)))
          findings = [
              {
                  "ip": target,
                  "type": "known_cve",
                  "severity": "MEDIUM",
                  "details": "Nmap NSE reported vulnerability references",
                  "evidence": text[:1000],
                  "evidence_level": 1,
                  "cve_ids": cves,
              }
          ] if cves else []
          open(output, "w", encoding="utf-8").write(json.dumps({"tool": "nmap_nse", "scenario": "", "target": target, "findings": findings}, indent=2))
          PY

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "Baseline VM management IP : {{ ansible_host }}"
          - "Baseline benchmark IP  : {{ baseline_benchmark_ip }}"
          - "Tools directory        : /opt/baseline-tools"
          - "Run from master        : python3 -m src.baselines run --tool cai --scenario 1 --baseline-host root@{{ ansible_host }}"
