---
# Deploy a single isolated baseline VM for external pentest agents.
#
# Usage:
#   ansible-playbook benchmarks/ansible/playbooks/deploy_baseline_vm.yml \
#     --vault-password-file ~/.vault_pass -i benchmarks/ansible/inventory.yml
#
# Provisioning + configuration are factored into reusable task files used by
# both this playbook and `deploy_fleet.yml`.

- name: Provision LXC baseline VM on Proxmox
  hosts: proxmox
  gather_facts: false
  tasks:
    - name: Provision baseline LXC
      ansible.builtin.include_tasks: ../tasks/provision_baseline_lxc.yml
      vars:
        baseline_inventory_name: baseline
        baseline_inventory_groups:
          - baseline

- name: Configure isolated baseline VM
  hosts: baseline
  gather_facts: true
  tasks:
    - name: Configure baseline
      ansible.builtin.include_tasks: ../tasks/configure_baseline.yml
