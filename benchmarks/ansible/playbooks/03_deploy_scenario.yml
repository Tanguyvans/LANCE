# 03_deploy_scenario.yml — Déploiement des VMs d'un scénario benchmark
# Usage : ansible-playbook -i inventory.yml playbooks/03_deploy_scenario.yml \
#           --ask-vault-pass --extra-vars "scenario_id=1"
#
# Scénarios disponibles (définis dans group_vars/all/main.yml) :
#   1-7  — Scénarios de base (Flat, Gateway, NATO Lab, Segmenté, Building, Domotique, Edge-Cloud)
#   8-10 — Scénarios étendus (Multi-zone IT/IoT/OT, Mesh IoT, Flat variantes)
#   11   — Smart City 3 zones (15 VMs, VMIDs 220-234)
#   12   — Smart City Large Scale (35 VMs, VMIDs 235-269)
#
# Chaque scénario tourne de façon isolée sur vmbr1 (un seul scénario à la fois).
# Pour supprimer un scénario : 99_teardown.yml --extra-vars "scenario_id=1"

- name: Déploiement du scénario {{ scenario_id | default('?') }}
  hosts: proxmox
  gather_facts: false

  vars:
    scenario_id: "1"   # override avec --extra-vars "scenario_id=2"
    base_vmid: "{{ scenario_vmid_ranges[scenario_id] | int }}"
    # scenarios est défini dans group_vars/all.yml (source unique de vérité)

  tasks:

    - name: Vérifier que le scénario est défini
      ansible.builtin.fail:
        msg: "scenario_id={{ scenario_id }} non défini. Valeurs valides : {{ scenarios.keys() | sort | join(', ') }}"
      when: scenario_id not in scenarios

    - name: Vérifier que le template Debian ({{ tpl_debian_vmid }}) existe
      ansible.builtin.command: pct status {{ tpl_debian_vmid }}
      register: tpl_debian_check
      changed_when: false
      failed_when: false

    - name: Bloquer si template Debian absent
      ansible.builtin.fail:
        msg: "Template Debian ({{ tpl_debian_vmid }}) introuvable. Lancer d'abord : ansible-playbook -i inventory.yml playbooks/01_create_templates.yml --ask-vault-pass"
      when: tpl_debian_check.rc != 0

    - name: Vérifier que le template OpenWrt ({{ tpl_openwrt_vmid }}) existe
      ansible.builtin.command: qm status {{ tpl_openwrt_vmid }}
      register: tpl_openwrt_check
      changed_when: false
      failed_when: false

    - name: Bloquer si template OpenWrt absent
      ansible.builtin.fail:
        msg: "Template OpenWrt ({{ tpl_openwrt_vmid }}) introuvable. Lancer d'abord : ansible-playbook -i inventory.yml playbooks/02_config_openwrt.yml --ask-vault-pass"
      when: tpl_openwrt_check.rc != 0

    - name: Détecter si un autre scénario est déjà en cours
      ansible.builtin.shell: |
        running=$(
          { qm list 2>/dev/null | awk 'NR>1 && $3=="running" {print $1}';
            pct list 2>/dev/null | awk 'NR>1 && $2=="running" {print $1}'; }
        )
        conflict_scenario=""
        for vmid in $running; do
          [ "$vmid" -lt 100 ] 2>/dev/null || [ "$vmid" -gt 269 ] 2>/dev/null && continue
          base={{ base_vmid }}
          # S11 uses 15 VMIDs (220-234); S12 uses 35 VMIDs (235-269); others use 10 each
          slot_size=10
          [ "$base" -eq 220 ] && slot_size=15
          [ "$base" -eq 235 ] && slot_size=35
          [ "$vmid" -ge "$base" ] && [ "$vmid" -lt "$((base + slot_size))" ] && continue
          {% for sid, sbase in scenario_vmid_ranges.items() %}
          if [ "$vmid" -ge "{{ sbase }}" ] && [ "$vmid" -lt "{{ sbase + (15 if sbase == 220 else (35 if sbase == 235 else 10)) }}" ]; then
            conflict_scenario="{{ sid }}"
          fi
          {% endfor %}
          [ -n "$conflict_scenario" ] && break
        done
        if [ -n "$conflict_scenario" ]; then
          echo "CONFLICT:$conflict_scenario"
          exit 1
        fi
        echo "OK"
      register: conflict_check
      changed_when: false
      failed_when: false

    - name: Bloquer si un autre scénario tourne déjà
      ansible.builtin.fail:
        msg: |
          Le scénario S{{ conflict_check.stdout | regex_replace('CONFLICT:(\d+).*', '\1') }} est déjà en cours sur vmbr1.
          Les scénarios partagent le même réseau 192.168.100.0/24 — un seul à la fois.
          Teardown d'abord :
            ansible-playbook playbooks/99_teardown.yml --extra-vars "scenario_id={{ conflict_check.stdout | regex_replace('CONFLICT:(\d+).*', '\1') }}"
      when: conflict_check.rc != 0

    - name: Afficher le scénario à déployer
      ansible.builtin.debug:
        msg: |
          Déploiement : S{{ scenario_id }} — {{ scenarios[scenario_id].name }}
          VMID router  : {{ base_vmid }}
          VMID services: {{ base_vmid | int + 1 }} → {{ base_vmid | int + scenarios[scenario_id].services | length }}


    # ── Router OpenWrt ──
    - name: Vérifier si le router du scénario existe déjà
      ansible.builtin.command: qm status {{ base_vmid }}
      register: router_check
      changed_when: false
      failed_when: false

    - name: Cloner le template OpenWrt pour le router du scénario
      ansible.builtin.command: >-
        qm clone {{ tpl_openwrt_vmid }} {{ base_vmid }}
        --name s{{ scenario_id }}-router
        --full
      when: router_check.rc != 0

    - name: Démarrer le router OpenWrt
      ansible.builtin.command: qm start {{ base_vmid }}
      when: router_check.rc != 0

    - name: Attendre que le router OpenWrt soit prêt (port 22 ou 80)
      ansible.builtin.command: >-
        qm guest exec {{ base_vmid }} -- sh -c "ss -tlnp | grep -qE ':22|:80'"
      register: router_ready
      until: router_ready is succeeded
      retries: 15
      delay: 5
      changed_when: false
      failed_when: false


    # ── Services LXC ──
    - name: Vérifier si chaque CT service existe déjà
      ansible.builtin.command: pct status {{ base_vmid | int + item.vmid_offset }}
      register: ct_checks
      changed_when: false
      failed_when: false
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        index_var: idx

    - name: Cloner le template Debian pour chaque service
      ansible.builtin.command: >-
        pct clone {{ tpl_debian_vmid }} {{ base_vmid | int + item.vmid_offset }}
        --hostname s{{ scenario_id }}-{{ item.name }}
        --full
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        index_var: idx
      when: ct_checks.results[idx].rc != 0

    - name: Configurer le réseau et le DNS de chaque CT
      ansible.builtin.command: >-
        pct set {{ base_vmid | int + item.vmid_offset }}
        --net0 name=eth0,bridge={{ benchmark_bridge }},ip={{ item.ip }}/24,gw={{ benchmark_gateway }}
        --nameserver {{ benchmark_dns }}
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        index_var: idx
      when: ct_checks.results[idx].rc != 0

    - name: Démarrer chaque CT service
      ansible.builtin.command: pct start {{ base_vmid | int + item.vmid_offset }}
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        index_var: idx
      when: ct_checks.results[idx].rc != 0

    - name: Attendre que chaque CT soit prêt (SSH actif)
      ansible.builtin.command: >-
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        sh -c "ss -tlnp | grep -q ':22'"
      loop: "{{ scenarios[scenario_id].services }}"
      register: ct_ssh_ready
      until: ct_ssh_ready is succeeded
      retries: 12
      delay: 5
      changed_when: false

    - name: Vérifier la connectivité réseau de chaque CT
      ansible.builtin.command: >-
        pct exec {{ base_vmid | int + item.vmid_offset }} -- ping -c1 -W2 {{ benchmark_gateway }}
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        index_var: idx
      register: ct_ping
      changed_when: false
      failed_when: false

    - name: Résumé du déploiement
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════════
          Scénario S{{ scenario_id }} — {{ scenarios[scenario_id].name }} déployé
          ──────────────────────────────────────────────────────────
          {{ base_vmid }}  s{{ scenario_id }}-router  192.168.100.1  (OpenWrt WAN=DHCP)
          {% for svc in scenarios[scenario_id].services %}
          {{ base_vmid | int + svc.vmid_offset }}  s{{ scenario_id }}-{{ svc.name }}  {{ svc.ip }}  [{{ 'OK' if ct_ping.results[loop.index0].rc == 0 else 'NO PING' }}]
          {% endfor %}
          ──────────────────────────────────────────────────────────
          Prochaine étape : 04_inject_vulns.yml --extra-vars "scenario_id={{ scenario_id }}"
          ══════════════════════════════════════════════════════════
