# 04_inject_vulns.yml — Injection des vulnérabilités dans les VMs d'un scénario
# Usage : ansible-playbook -i inventory.yml playbooks/04_inject_vulns.yml \
#           --ask-vault-pass --extra-vars "scenario_id=1"
#
# Vulnérabilités injectées par rôle :
#   mqtt_broker  → Mosquitto allow_anonymous true, listener 0.0.0.0:1883
#   web_server   → nginx 1.19.6 + directory listing (autoindex on)
#   ssh_server   → user admin/admin, PasswordAuthentication yes
#   iot_gateway  → Dropbear 2020.81 (Terrapin), HTTP sans TLS
#   db_server    → MariaDB root sans mot de passe
#
# Vulnérabilités OpenWrt (injectées via SSH depuis Proxmox) :
#   S1 router    → Telnet activé (port 23)
#   S2 router    → Telnet + interface web admin accessible WAN (port 80)

- name: Injection des vulnérabilités — Scénario {{ scenario_id | default('?') }}
  hosts: proxmox
  gather_facts: false

  vars:
    scenario_id: "1"
    base_vmid: "{{ scenario_vmid_ranges[scenario_id] | int }}"
    proxmox_tmp_ip: "192.168.100.254"   # IP temp sur vmbr1 pour joindre OpenWrt

    scenarios:
      "1":
        services:
          - { name: mqtt, vmid_offset: 1, role: mqtt_broker  }
          - { name: web,  vmid_offset: 2, role: web_server   }
          - { name: ssh,  vmid_offset: 3, role: ssh_server   }
        router_vulns: [telnet]

      "2":
        services:
          - { name: web,    vmid_offset: 1, role: web_server   }
          - { name: mqtt,   vmid_offset: 2, role: mqtt_broker  }
          - { name: iot-gw, vmid_offset: 3, role: iot_gateway  }
          - { name: db,     vmid_offset: 4, role: db_server    }
          - { name: jump,   vmid_offset: 5, role: ssh_server   }
        router_vulns: [telnet, admin_wan]

      "3":
        services:
          - { name: wisgate, vmid_offset: 1, role: iot_gateway  }
          - { name: rpi5,    vmid_offset: 2, role: mqtt_broker  }
          - { name: iot-hub, vmid_offset: 3, role: mqtt_broker  }
          - { name: jetson,  vmid_offset: 4, role: ssh_server   }
          - { name: ap,      vmid_offset: 5, role: web_server   }
          - { name: cam,     vmid_offset: 6, role: web_server   }
          - { name: nvr,     vmid_offset: 7, role: ssh_server   }
        router_vulns: [telnet, ftp]

  tasks:

    # ── DNS : nécessaire pour apt-get dans les CTs ──
    - name: Configurer le DNS dans tous les CTs du scénario
      ansible.builtin.command: >-
        pct set {{ base_vmid | int + item.vmid_offset }}
        --nameserver {{ benchmark_dns }}
      loop: "{{ scenarios[scenario_id].services }}"
      changed_when: true

    # ── IP temporaire sur vmbr1 pour joindre OpenWrt LAN ──
    - name: Ajouter IP temporaire {{ proxmox_tmp_ip }} sur vmbr1 (accès OpenWrt)
      ansible.builtin.command: ip addr add {{ proxmox_tmp_ip }}/24 dev vmbr1
      failed_when: false
      changed_when: true


    # ════════════════════════════════════════════════════
    # VULNÉRABILITÉS PAR RÔLE — LXC containers
    # ════════════════════════════════════════════════════

    # ── MQTT Broker : allow_anonymous ──
    - name: "[mqtt_broker] Écrire le script d'injection MQTT"
      ansible.builtin.copy:
        dest: /tmp/inject_mqtt.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq mosquitto
          cat > /etc/mosquitto/conf.d/benchmark.conf << 'EOF'
          # Benchmark — Faille V1 : MQTT sans authentification
          allow_anonymous true
          listener 1883 0.0.0.0
          EOF
          systemctl enable mosquitto
          systemctl restart mosquitto
          echo "[OK] MQTT anonymous access configuré"

    - name: "[mqtt_broker] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_mqtt.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'mqtt_broker'
      changed_when: true


    # ── Web Server : nginx 1.19.6 + directory listing ──
    - name: "[web_server] Écrire le script d'injection nginx"
      ansible.builtin.copy:
        dest: /tmp/inject_web.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          # Installer nginx depuis les repos Debian (version disponible)
          # La faille benchmark est l'autoindex on, pas la version exacte
          apt-get update -qq
          apt-get install -y -qq nginx

          # Faille V2 + V5 : directory listing + pas de restriction
          cat > /etc/nginx/conf.d/default.conf << 'EOF'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/html;
              autoindex on;
              location / {
                  try_files $uri $uri/ =404;
              }
          }
          EOF
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

          # Contenu de test avec données sensibles simulées
          mkdir -p /var/www/html/backup
          echo '{"db_password":"P@ssw0rd123","api_key":"sk-bench-1234"}' \
            > /var/www/html/backup/config.json

          systemctl enable nginx
          nginx -t && systemctl restart nginx
          echo "[OK] nginx configuré (directory listing activé)"

    - name: "[web_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_web.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_server'
      changed_when: true


    # ── SSH Server : creds admin/admin ──
    - name: "[ssh_server] Écrire le script d'injection SSH"
      ansible.builtin.copy:
        dest: /tmp/inject_ssh.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y -qq openssh-server

          # Faille V3 : user admin avec mot de passe par défaut
          useradd -m -s /bin/bash admin 2>/dev/null || true
          echo "admin:admin" | chpasswd

          # Activer l'auth par mot de passe et root login
          sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sed -i 's/^#\?MaxAuthTries.*/MaxAuthTries 10/' /etc/ssh/sshd_config
          echo "root:root" | chpasswd

          systemctl enable ssh
          systemctl restart ssh
          echo "[OK] SSH avec creds admin/admin configuré"

    - name: "[ssh_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_ssh.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ssh_server'
      changed_when: true


    # ── IoT Gateway : Dropbear 2020.81 + HTTP sans TLS ──
    - name: "[iot_gateway] Écrire le script d'injection IoT Gateway"
      ansible.builtin.copy:
        dest: /tmp/inject_iotgw.sh
        mode: "0755"
        content: |
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y -qq wget

          # Faille V3/V4 : Dropbear 2020.81 (Terrapin CVE-2023-48795)
          # Télécharge le .deb depuis les archives Debian Bullseye (timeout 30s)
          if wget -q --timeout=30 -O /tmp/dropbear.deb \
            "http://archive.debian.org/debian/pool/main/d/dropbear/dropbear_2020.81-3_amd64.deb"; then
            dpkg -i /tmp/dropbear.deb || apt-get install -f -y -qq
          else
            echo "[WARN] Dropbear archive inaccessible, installation depuis les repos"
            apt-get install -y -qq dropbear
          fi

          # Désactiver OpenSSH, activer Dropbear sur port 22
          sed -i 's/^NO_START=1/NO_START=0/' /etc/default/dropbear 2>/dev/null || true
          sed -i 's/^DROPBEAR_PORT=.*/DROPBEAR_PORT=22/' /etc/default/dropbear 2>/dev/null || \
            echo "DROPBEAR_PORT=22" >> /etc/default/dropbear
          systemctl disable ssh 2>/dev/null || true
          systemctl enable dropbear
          systemctl restart dropbear

          # Faille V5/V6 : interface HTTP nginx sans HTTPS
          apt-get install -y -qq nginx
          cat > /etc/nginx/conf.d/admin.conf << 'EOF'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/html;
              location /admin { return 200 "Admin panel — no auth required"; }
          }
          EOF
          systemctl enable nginx && systemctl restart nginx
          echo "[OK] Dropbear 2020.81 + HTTP admin configuré"

    - name: "[iot_gateway] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_iotgw.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'iot_gateway'
      changed_when: true


    # ── DB Server : MariaDB root sans mot de passe ──
    - name: "[db_server] Écrire le script d'injection DB"
      ansible.builtin.copy:
        dest: /tmp/inject_db.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y -qq mariadb-server

          systemctl enable mariadb
          systemctl start mariadb

          # Faille V5 : root sans mot de passe + accès depuis n'importe où
          mysql -u root << 'SQL'
          ALTER USER 'root'@'localhost' IDENTIFIED BY '';
          CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY '';
          GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
          FLUSH PRIVILEGES;
          SQL

          # Autoriser les connexions distantes
          sed -i 's/^bind-address.*/bind-address = 0.0.0.0/' \
            /etc/mysql/mariadb.conf.d/50-server.cnf
          systemctl restart mariadb
          echo "[OK] MariaDB root sans mot de passe configuré"

    - name: "[db_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_db.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'db_server'
      changed_when: true


    # ════════════════════════════════════════════════════
    # VULNÉRABILITÉS OPENWR — via SSH depuis Proxmox
    # ════════════════════════════════════════════════════

    - name: "[OpenWrt] Activer Telnet (port 23)"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          root@{{ benchmark_gateway }} \
          'telnetd -l /bin/ash -p 23 2>/dev/null &
           grep -q telnetd /etc/rc.local 2>/dev/null || \
           echo "telnetd -l /bin/ash -p 23 &" >> /etc/rc.local'
      when: "'telnet' in scenarios[scenario_id].router_vulns"
      changed_when: true

    - name: "[OpenWrt] Exposer l'interface web admin sur WAN (port 80)"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          root@{{ benchmark_gateway }} \
          'uci set uhttpd.main.listen_http="0.0.0.0:80"
           uci commit uhttpd
           /etc/init.d/uhttpd restart'
      when: "'admin_wan' in scenarios[scenario_id].router_vulns"
      changed_when: true

    - name: "[OpenWrt] Activer FTP (port 21) via vsftpd"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          root@{{ benchmark_gateway }} \
          'opkg update && opkg install vsftpd &&
           echo "anonymous_enable=YES" >> /etc/vsftpd.conf &&
           /etc/init.d/vsftpd enable && /etc/init.d/vsftpd start'
      when: "'ftp' in scenarios[scenario_id].router_vulns"
      failed_when: false
      changed_when: true


    # ── Nettoyage IP temporaire ──
    - name: Retirer l'IP temporaire de vmbr1
      ansible.builtin.command: ip addr del {{ proxmox_tmp_ip }}/24 dev vmbr1
      failed_when: false
      changed_when: true


    # ── Résumé ──
    - name: Résumé des vulnérabilités injectées
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════════
          Vulnérabilités injectées — Scénario S{{ scenario_id }}
          ──────────────────────────────────────────────────────────
          {% for svc in scenarios[scenario_id].services %}
          {{ base_vmid | int + svc.vmid_offset }}  s{{ scenario_id }}-{{ svc.name }}  [{{ svc.role }}]
          {% endfor %}
          {{ base_vmid }}  s{{ scenario_id }}-router  {{ scenarios[scenario_id].router_vulns | join(', ') }}
          ──────────────────────────────────────────────────────────
          Prochaine étape : lancer le pipeline LLM sur ce scénario
          ══════════════════════════════════════════════════════════
