# 04_inject_vulns.yml — Injection des vulnérabilités dans les VMs d'un scénario
# Usage : ansible-playbook -i inventory.yml playbooks/04_inject_vulns.yml \
#           --ask-vault-pass --extra-vars "scenario_id=1"
#
# Vulnérabilités injectées par rôle :
#   mqtt_broker  → Mosquitto allow_anonymous true, listener 0.0.0.0:1883
#   web_server   → nginx 1.19.6 + directory listing (autoindex on)
#   ssh_server   → user admin/admin, PasswordAuthentication yes
#   iot_gateway  → Dropbear 2020.81 (Terrapin), HTTP sans TLS
#   db_server    → MariaDB root sans mot de passe
#
# Vulnérabilités OpenWrt (injectées via SSH depuis Proxmox) :
#   S1/S3 router → Telnet activé (port 23)
#   S2/S4/S5/S6/S7 router → Telnet + interface web admin accessible WAN (port 80)

- name: Injection des vulnérabilités — Scénario {{ scenario_id | default('?') }}
  hosts: proxmox
  gather_facts: false

  vars:
    scenario_id: "1"
    base_vmid: "{{ scenario_vmid_ranges[scenario_id] | int }}"
    proxmox_tmp_ip: "192.168.100.254"   # IP temp sur vmbr1 pour joindre OpenWrt
    # scenarios est défini dans group_vars/all.yml (source unique de vérité)

  tasks:

    # ── DNS : nécessaire pour apt-get dans les CTs ──
    - name: Configurer le DNS dans tous les CTs du scénario
      ansible.builtin.command: >-
        pct set {{ base_vmid | int + item.vmid_offset }}
        --nameserver {% if item.vlan_id is defined %}192.168.{{ item.vlan_id }}.1{% else %}{{ benchmark_dns }}{% endif %}
      loop: "{{ scenarios[scenario_id].services }}"
      register: dns_set
      changed_when: dns_set.rc == 0

    # ── IP temporaire sur vmbr1 pour joindre OpenWrt LAN ──
    - name: Ajouter IP temporaire {{ proxmox_tmp_ip }} sur vmbr1 (accès OpenWrt)
      ansible.builtin.command: ip addr add {{ proxmox_tmp_ip }}/24 dev vmbr1
      register: add_tmp_ip
      failed_when: false
      changed_when: add_tmp_ip.rc == 0


    # ── S13 : s'assurer qu'apt-cacher-ng tourne sur le master (LXC 200) ──
    - name: "[S13] Vérifier/démarrer apt-cacher-ng sur le master"
      ansible.builtin.shell: |
        pct exec 200 -- sh -c "
          dpkg -l apt-cacher-ng 2>/dev/null | grep -q '^ii' || DEBIAN_FRONTEND=noninteractive apt-get install -y -qq apt-cacher-ng
          sed -i 's/^BindAddress:.*/#&/' /etc/apt-cacher-ng/acng.conf
          sed -i '/^AllowedClients/d' /etc/apt-cacher-ng/acng.conf
          systemctl enable apt-cacher-ng
          systemctl reset-failed apt-cacher-ng 2>/dev/null || true
          systemctl restart apt-cacher-ng
          sleep 1
          ss -tlnp | grep 3142 && echo ACN_OK || echo ACN_FAIL
        "
      when: scenario_id == '13'
      register: acng_result
      changed_when: false
      failed_when: "'ACN_FAIL' in acng_result.stdout or acng_result.rc != 0"

    # ════════════════════════════════════════════════════
    # S13 ONLY — Configuration OpenWrt VLAN + isolement
    #
    # Architecture : OpenWrt multihomé (VMID {{ base_vmid }})
    #   eth0 → vmbr1 LAN (192.168.100.1) — accès master + pipeline
    #   eth1 → vmbr0 WAN (DHCP) — internet
    #   eth2 → vmbr1 trunk (tag=10;20;30) — sous-interfaces eth2.10/20/30
    #
    # Méthode : SSH direct depuis Proxmox via IP temp 192.168.100.254
    # OpenWrt n'a pas de QEMU guest agent — qm exec non disponible.
    # ════════════════════════════════════════════════════

    - name: "[S13] Écrire le script de configuration réseau OpenWrt (eth2 UP + UCI VLAN)"
      ansible.builtin.copy:
        dest: /tmp/s13_openwrt_net.sh
        mode: "0755"
        content: |
          #!/bin/sh
          # eth2 démarre DOWN — doit être monté avant network restart
          ip link set eth2 up 2>/dev/null || true
          uci -q delete network.vlan10 2>/dev/null || true
          uci set network.vlan10=interface
          uci set network.vlan10.ifname=eth2.10
          uci set network.vlan10.proto=static
          uci set network.vlan10.ipaddr=192.168.10.1
          uci set network.vlan10.netmask=255.255.255.0
          uci -q delete network.vlan20 2>/dev/null || true
          uci set network.vlan20=interface
          uci set network.vlan20.ifname=eth2.20
          uci set network.vlan20.proto=static
          uci set network.vlan20.ipaddr=192.168.20.1
          uci set network.vlan20.netmask=255.255.255.0
          uci -q delete network.vlan30 2>/dev/null || true
          uci set network.vlan30=interface
          uci set network.vlan30.ifname=eth2.30
          uci set network.vlan30.proto=static
          uci set network.vlan30.ipaddr=192.168.30.1
          uci set network.vlan30.netmask=255.255.255.0
          uci commit network
          # Lance en arrière-plan — la connexion SSH va chuter brièvement
          /etc/init.d/network restart >/dev/null 2>&1 &
          sleep 1
          exit 0
      when: scenario_id == '13'

    - name: "[S13] Pousser + exécuter la config réseau sur OpenWrt (connexion peut chuter)"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 root@{{ benchmark_gateway }} 'cat > /tmp/s13_openwrt_net.sh' < /tmp/s13_openwrt_net.sh
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 root@{{ benchmark_gateway }} 'sh /tmp/s13_openwrt_net.sh' 2>/dev/null || true
      when: scenario_id == '13'
      changed_when: true

    - name: "[S13] Attendre la fin du network restart (15s)"
      ansible.builtin.pause:
        seconds: 15
      when: scenario_id == '13'

    - name: "[S13] Vérifier eth2.20 avec IP 192.168.20.1 (retry 15×5s)"
      ansible.builtin.shell: >-
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10
        root@{{ benchmark_gateway }}
        'ip addr show eth2.20 2>/dev/null | grep -q 192.168.20.1 && echo ok'
      register: vlan_up
      until: vlan_up.rc == 0 and 'ok' in vlan_up.stdout
      retries: 15
      delay: 5
      when: scenario_id == '13'
      changed_when: false

    - name: "[S13] Écrire le script de configuration pare-feu OpenWrt (UCI fw4 + règles inter-VLAN)"
      ansible.builtin.copy:
        dest: /tmp/s13_openwrt_fw.sh
        mode: "0755"
        content: |
          #!/bin/sh
          set -e

          # Zones VLAN avec masquerade — fw4 génère les chains srcnat automatiquement
          uci set firewall.vlan10=zone
          uci set firewall.vlan10.name=vlan10
          uci set firewall.vlan10.network=vlan10
          uci set firewall.vlan10.input=ACCEPT
          uci set firewall.vlan10.output=ACCEPT
          uci set firewall.vlan10.forward=REJECT
          uci set firewall.vlan10.masq=1

          uci set firewall.vlan20=zone
          uci set firewall.vlan20.name=vlan20
          uci set firewall.vlan20.network=vlan20
          uci set firewall.vlan20.input=ACCEPT
          uci set firewall.vlan20.output=ACCEPT
          uci set firewall.vlan20.forward=REJECT
          uci set firewall.vlan20.masq=1

          uci set firewall.vlan30=zone
          uci set firewall.vlan30.name=vlan30
          uci set firewall.vlan30.network=vlan30
          uci set firewall.vlan30.input=ACCEPT
          uci set firewall.vlan30.output=ACCEPT
          uci set firewall.vlan30.forward=REJECT
          uci set firewall.vlan30.masq=1

          # VLAN → lan : internet + proxy apt-cacher-ng (192.168.100.200:3142)
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=vlan10; uci set firewall.@forwarding[-1].dest=lan
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=vlan20; uci set firewall.@forwarding[-1].dest=lan
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=vlan30; uci set firewall.@forwarding[-1].dest=lan

          # lan → VLAN : pipeline master peut scanner toutes les cibles
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=lan; uci set firewall.@forwarding[-1].dest=vlan10
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=lan; uci set firewall.@forwarding[-1].dest=vlan20
          uci add firewall forwarding; uci set firewall.@forwarding[-1].src=lan; uci set firewall.@forwarding[-1].dest=vlan30

          # IT → IoT : MQTT/1883 seulement (reste REJECT par zone forward=REJECT)
          uci add firewall rule
          uci set firewall.@rule[-1].name=s13-it-iot-mqtt
          uci set firewall.@rule[-1].src=vlan10
          uci set firewall.@rule[-1].dest=vlan20
          uci set firewall.@rule[-1].proto=tcp
          uci set firewall.@rule[-1].dest_port=1883
          uci set firewall.@rule[-1].target=ACCEPT

          # IT → OT : SSH/22 (tunnel port-forwarding P2 — VPN pivot)
          uci add firewall rule
          uci set firewall.@rule[-1].name=s13-it-ot-ssh
          uci set firewall.@rule[-1].src=vlan10
          uci set firewall.@rule[-1].dest=vlan30
          uci set firewall.@rule[-1].proto=tcp
          uci set firewall.@rule[-1].dest_port=22
          uci set firewall.@rule[-1].target=ACCEPT

          # IT → OT : Redis/6379 (V17 — trou volontaire, non filtré, chemin P3)
          uci add firewall rule
          uci set firewall.@rule[-1].name=s13-it-ot-redis
          uci set firewall.@rule[-1].src=vlan10
          uci set firewall.@rule[-1].dest=vlan30
          uci set firewall.@rule[-1].proto=tcp
          uci set firewall.@rule[-1].dest_port=6379
          uci set firewall.@rule[-1].target=ACCEPT

          # IoT → OT : Modbus/502 (V14 — pont Node-RED→PLC, chemin P1)
          uci add firewall rule
          uci set firewall.@rule[-1].name=s13-iot-ot-modbus
          uci set firewall.@rule[-1].src=vlan20
          uci set firewall.@rule[-1].dest=vlan30
          uci set firewall.@rule[-1].proto=tcp
          uci set firewall.@rule[-1].dest_port=502
          uci set firewall.@rule[-1].target=ACCEPT

          # V2 : CoAP UDP/5683 IoT→OT non bloqué (pas de règle DROP UDP explicite)

          uci commit firewall
          /etc/init.d/firewall restart
          echo FW_OK
      when: scenario_id == '13'

    - name: "[S13] Pousser + exécuter la config pare-feu sur OpenWrt"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 root@{{ benchmark_gateway }} 'cat > /tmp/s13_openwrt_fw.sh' < /tmp/s13_openwrt_fw.sh
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 root@{{ benchmark_gateway }} 'sh /tmp/s13_openwrt_fw.sh'
      when: scenario_id == '13'
      changed_when: true
      register: fw_result
      failed_when: "'FW_OK' not in fw_result.stdout"

    - name: "[S13] Injecter vulns OpenWrt (V3: root:password, V1: LuCI WAN, eth2 persist)"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 \
          root@{{ benchmark_gateway }} \
          'echo "root:password" | chpasswd
           uci set uhttpd.main.listen_http="0.0.0.0:80"
           uci commit uhttpd
           /etc/init.d/uhttpd restart 2>/dev/null || true
           grep -q "ip link set eth2 up" /etc/rc.local 2>/dev/null || printf "#!/bin/sh\nip link set eth2 up\nexit 0\n" > /etc/rc.local
           chmod +x /etc/rc.local
           echo VULN_OK'
      when: scenario_id == '13'
      changed_when: true
      register: vuln_result
      failed_when: "'VULN_OK' not in vuln_result.stdout"

    - name: "[S13] Configurer le proxy apt dans les CTs VLAN (apt-cacher-ng sur master)"
      ansible.builtin.shell: |
        printf 'Acquire::http::Proxy "http://192.168.100.200:3142/";\nAcquire::ForceIPv4 "true";\n' > /tmp/s13_01proxy
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/s13_01proxy /etc/apt/apt.conf.d/01proxy
      loop: "{{ scenarios[scenario_id].services }}"
      when: scenario_id == '13'
      changed_when: true

    - name: "[S13] Vérifier connectivité CT→proxy (VLAN→LAN 192.168.100.200:3142)"
      ansible.builtin.shell: >-
        pct exec {{ base_vmid | int + item.vmid_offset }} --
        sh -c "ping -c1 -W3 192.168.100.200 >/dev/null 2>&1 && nc -zw3 192.168.100.200 3142 >/dev/null 2>&1 && echo PROXY_OK"
      loop: "{{ scenarios[scenario_id].services }}"
      loop_control:
        label: "{{ item.name }}"
      when: scenario_id == '13'
      register: proxy_check
      changed_when: false
      failed_when: false

    - name: "[S13] Résumé connectivité proxy"
      ansible.builtin.debug:
        msg: "{{ item.item.name }} ({{ item.item.ip }}) → proxy: {{ 'OK' if item.rc == 0 else 'FAIL (rc=' + (item.rc | string) + ')' }}"
      loop: "{{ proxy_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: scenario_id == '13'

    - name: "[S13] FAIL si au moins un CT ne peut pas joindre apt-cacher-ng"
      ansible.builtin.fail:
        msg: "Proxy inaccessible depuis {{ item.item.name }} ({{ item.item.ip }}) — vérifier UCI fw4 zones + apt-cacher-ng sur LXC 200"
      loop: "{{ proxy_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: scenario_id == '13' and item.rc != 0


    # ════════════════════════════════════════════════════
    # VULNÉRABILITÉS PAR RÔLE — LXC containers
    # ════════════════════════════════════════════════════

    # ── MQTT Broker : allow_anonymous ──
    - name: "[mqtt_broker] Écrire le script d'injection MQTT"
      ansible.builtin.copy:
        dest: /tmp/inject_mqtt.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq mosquitto mosquitto-clients
          printf 'allow_anonymous true\nlistener 1883 0.0.0.0\n' > /etc/mosquitto/conf.d/benchmark.conf
          systemctl enable mosquitto
          systemctl restart mosquitto
          sleep 2

          # Publier des messages sur les topics sensibles pour que mqtt_listen les capte
          mosquitto_pub -h localhost -t "smartcity/admin/credentials" \
            -m '{"db_user":"root","db_pass":"P@ssw0rd123","api_key":"sk-bench-api-1234"}' -r
          mosquitto_pub -h localhost -t "smartcity/sensors/temp" -m '{"value":22.5,"unit":"C"}' -r
          mosquitto_pub -h localhost -t "smartcity/status" -m '{"online":true,"version":"2.0.21"}' -r
          echo "[OK] MQTT anonymous access configuré + topics sensibles publiés"

    - name: "[mqtt_broker] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_mqtt.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'mqtt_broker'
      changed_when: true


    # ── Web Server : nginx 1.19.6 + directory listing ──
    - name: "[web_server] Écrire le script d'injection nginx"
      ansible.builtin.copy:
        dest: /tmp/inject_web.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          # Installer nginx depuis les repos Debian (version disponible)
          # La faille benchmark est l'autoindex on, pas la version exacte
          apt-get update -qq
          apt-get install -y -qq nginx

          # Faille V2 + V5 : directory listing + pas de restriction
          printf 'server {\n    listen 80 default_server;\n    server_name _;\n    root /var/www/html;\n    autoindex on;\n    location / { try_files $uri $uri/ =404; }\n}\n' > /etc/nginx/conf.d/default.conf
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

          # Contenu de test avec données sensibles — paths conformes au ground truth
          mkdir -p /var/www/html/backup /var/www/html/config

          # /backup/db_backup_2024-01-15.sql — dump SQL avec credentials
          cat > /var/www/html/backup/db_backup_2024-01-15.sql << 'SQLEOF'
          -- MySQL dump — smartcity database
          INSERT INTO users VALUES (1,'admin','P@ssw0rd123','admin@smartcity.local');
          INSERT INTO api_keys VALUES (1,'sk-bench-api-1234567890abcdef','read-write');
          SQLEOF

          # /config/app.config — credentials en clair
          cat > /var/www/html/config/app.config << 'CFGEOF'
          [database]
          host=192.168.100.14
          db_password=P@ssw0rd123
          user=root

          [api]
          api_key=sk-bench-api-1234567890abcdef

          [smtp]
          smtp_password=smtp_secret_123
          CFGEOF

          systemctl enable nginx
          nginx -t && systemctl restart nginx
          echo "[OK] nginx configuré (directory listing activé)"

    - name: "[web_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_web.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'web_server'
      changed_when: true


    # ── LDAP Server : slapd sans TLS + bind anonyme (V6 S13) ──
    - name: "[ldap_server] Écrire le script d'injection LDAP"
      ansible.builtin.copy:
        dest: /tmp/inject_ldap.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq slapd ldap-utils
          # Reconfigurer slapd sans TLS, bind anonyme activé
          systemctl stop slapd || true
          # Configuration basique sans TLS
          cat > /etc/ldap/slapd.conf << 'LDAPCONF'
          include /etc/ldap/schema/core.schema
          include /etc/ldap/schema/cosine.schema
          include /etc/ldap/schema/inetorgperson.schema
          pidfile /var/run/slapd/slapd.pid
          database mdb
          suffix "dc=iot,dc=local"
          rootdn "cn=admin,dc=iot,dc=local"
          rootpw secret
          directory /var/lib/ldap
          allow bind_anon_dn
          access to * by anonymous read by * read
          LDAPCONF
          # Démarrer slapd sur port 389 (sans TLS, sans ldaps)
          sed -i 's|SLAPD_SERVICES=.*|SLAPD_SERVICES="ldap:/// ldapi:///"|' /etc/default/slapd 2>/dev/null || true
          systemctl enable slapd
          systemctl restart slapd
          # Peupler l'annuaire avec des entrées sensibles
          sleep 2
          ldapadd -x -H ldap://localhost -D "cn=admin,dc=iot,dc=local" -w secret << 'LDIF' || true
          dn: dc=iot,dc=local
          objectClass: top
          objectClass: dcObject
          objectClass: organization
          o: IoT Local
          dc: iot

          dn: ou=users,dc=iot,dc=local
          objectClass: organizationalUnit
          ou: users

          dn: cn=iot-admin,ou=users,dc=iot,dc=local
          objectClass: inetOrgPerson
          cn: iot-admin
          sn: admin
          userPassword: AdminOT!2024
          description: OT admin credentials

          dn: cn=plc-user,ou=users,dc=iot,dc=local
          objectClass: inetOrgPerson
          cn: plc-user
          sn: plcuser
          userPassword: plc_secret_2024
          LDIF
          echo "[OK] slapd configuré (port 389, bind anonyme, no TLS)"

    - name: "[ldap_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_ldap.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ldap_server'
      changed_when: true

    # ── SSH Server : creds admin/admin ──
    - name: "[ssh_server] Écrire le script d'injection SSH"
      ansible.builtin.copy:
        dest: /tmp/inject_ssh.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq openssh-server

          # Faille V3 : user admin avec mot de passe par défaut
          useradd -m -s /bin/bash admin 2>/dev/null || true
          echo "admin:admin" | chpasswd

          # Activer l'auth par mot de passe et root login
          sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sed -i 's/^#\?MaxAuthTries.*/MaxAuthTries 10/' /etc/ssh/sshd_config
          echo "root:root" | chpasswd

          # F6 : ciphers SSH faibles (détectables par ssh-audit, compatibles OpenSSH 9+)
          printf '\n# Weak ciphers intentionnels (benchmark F6)\nCiphers aes128-cbc,aes192-cbc,aes256-cbc\nMACs hmac-sha1,hmac-sha1-etm@openssh.com\nKexAlgorithms diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1\n' >> /etc/ssh/sshd_config
          # Valider la config avant de redémarrer
          sshd -t || sed -i '/# Weak ciphers/,+4d' /etc/ssh/sshd_config

          systemctl enable ssh
          systemctl restart ssh
          echo "[OK] SSH avec creds admin/admin + weak ciphers configuré"

    - name: "[ssh_server] Push + exécuter dans chaque CT concerné"
      ansible.builtin.shell: |
        pct push {{ base_vmid | int + item.vmid_offset }} /tmp/inject_ssh.sh /tmp/inject.sh
        pct exec {{ base_vmid | int + item.vmid_offset }} -- bash /tmp/inject.sh
      loop: "{{ scenarios[scenario_id].services }}"
      when: item.role == 'ssh_server'
      changed_when: true


    # ── IoT Gateway : Dropbear 2020.81 + HTTP sans TLS ──
    - name: "[iot_gateway] Écrire le script d'injection IoT Gateway"
      ansible.builtin.copy:
        dest: /tmp/inject_iotgw.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          # Réparer l'état apt (broken deps possibles si le script a déjà tourné avec le downgrade Dropbear)
          dpkg --configure -a 2>/dev/null || true
          apt-get install -f -y -qq -o Dpkg::Options::="--force-all" 2>/dev/null || true

          # Installer les paquets nécessaires (idempotent : skip si déjà présents)
          dpkg -l wget 2>/dev/null | grep -q '^ii' || apt-get install -y -qq wget
          # Faille V5/V6 : interface HTTP nginx sans HTTPS
          # Installer nginx EN PREMIER (avant le downgrade Dropbear pour éviter les broken deps)
          dpkg -l nginx 2>/dev/null | grep -q '^ii' || apt-get install -y -qq nginx
          # Désactiver la config par défaut qui conflict sur port 80
          rm -f /etc/nginx/sites-enabled/default
          # F10 : firmware OTA sans signature ni authentification
          mkdir -p /var/www/html/firmware
          echo "IOT-GW-FIRMWARE-v2.1.3-RELEASE" > /var/www/html/firmware/firmware.bin
          # Intentionnellement : pas de .sha256 ni de .sig à côté du firmware

          {
          printf 'server {\n    listen 80 default_server;\n    server_name _;\n    root /var/www/html;\n'
          printf '    location /admin { return 200 "Admin panel - no auth required"; add_header Content-Type text/plain; }\n'
          printf "    location /api/devices { return 200 '{\"devices\":[\"192.168.100.11\",\"192.168.100.12\",\"192.168.100.13\",\"192.168.100.14\",\"192.168.100.15\"]}'; add_header Content-Type application/json; }\n"
          printf "    location /api/status { return 200 '{\"connections\":{\"mqtt\":\"192.168.100.12:1883\",\"db\":\"192.168.100.14:3306\"},\"uptime\":3600}'; add_header Content-Type application/json; }\n"
          printf '    location /firmware/ { autoindex on; }\n'
          printf "    location /update { return 200 '{\"status\":\"update accepted\",\"version\":\"2.1.4\"}'; add_header Content-Type application/json; }\n"
          printf '}\n'
          } > /etc/nginx/conf.d/admin.conf
          systemctl enable nginx && systemctl restart nginx

          # Faille V3/V4 : Dropbear 2020.81 (Terrapin CVE-2023-48795)
          # Installer APRÈS nginx pour éviter que le broken state bloque apt
          # Étape 1 : installer les libs de runtime requises par Dropbear 2020.81 (Bullseye)
          # libtomcrypt1t64 et libtommath1 fournissent libtomcrypt.so.1 / libtommath.so.1
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq libtomcrypt1t64 libtommath1 2>/dev/null || \
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq libtomcrypt1 libtommath1 2>/dev/null || true
          # Étape 2 : télécharger dropbear-bin (le binaire, pas le métapackage) depuis les archives Bullseye
          DROPBEAR_DEB="dropbear-bin_2020.81-3_amd64.deb"
          DROPBEAR_INSTALLED=false
          for URL in \
            "http://archive.debian.org/debian/pool/main/d/dropbear/${DROPBEAR_DEB}" \
            "http://snapshot.debian.org/archive/debian/20220101T000000Z/pool/main/d/dropbear/${DROPBEAR_DEB}" \
            "http://ftp.de.debian.org/debian/pool/main/d/dropbear/${DROPBEAR_DEB}"; do
            if wget -q --timeout=30 -O /tmp/dropbear-bin.deb "${URL}" 2>/dev/null; then
              dpkg --force-all -i /tmp/dropbear-bin.deb && DROPBEAR_INSTALLED=true && break
            fi
          done
          if [ "${DROPBEAR_INSTALLED}" = "false" ]; then
            echo "[WARN] Dropbear 2020.81 inaccessible — installation du dropbear système"
            # Lever le hold éventuel laissé par un run précédent avant d'installer
            apt-mark unhold dropbear-bin 2>/dev/null || true
            apt-get install -y -qq dropbear
          fi
          # Bloquer les mises à jour automatiques du paquet
          apt-mark hold dropbear-bin 2>/dev/null || apt-mark hold dropbear 2>/dev/null || true

          # Désactiver OpenSSH (service + socket)
          systemctl stop ssh.socket ssh 2>/dev/null || true
          systemctl disable ssh.socket ssh 2>/dev/null || true

          if [ "${DROPBEAR_INSTALLED}" = "true" ]; then
            # Dropbear 2020.81 (dropbear-bin) : pas d'unité systemd → créer clés + service minimal
            mkdir -p /etc/dropbear
            [ -f /etc/dropbear/dropbear_ed25519_host_key ] || \
              dropbearkey -t ed25519 -f /etc/dropbear/dropbear_ed25519_host_key > /dev/null 2>&1
            [ -f /etc/dropbear/dropbear_rsa_host_key ] || \
              dropbearkey -t rsa -s 2048 -f /etc/dropbear/dropbear_rsa_host_key > /dev/null 2>&1
            printf '[Unit]\nDescription=Dropbear SSH server 2020.81\nAfter=network.target\n[Service]\nType=simple\nExecStart=/usr/sbin/dropbear -F -E -p 22\nRestart=on-failure\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/dropbear.service
            systemctl daemon-reload
            systemctl enable dropbear
            systemctl restart dropbear
          else
            # Fallback dropbear système (2025.89) : activer via /etc/default/dropbear
            sed -i 's/^NO_START=.*/NO_START=0/' /etc/default/dropbear 2>/dev/null || true
            sed -i 's/^DROPBEAR_PORT=.*/DROPBEAR_PORT=22/' /etc/default/dropbear 2>/dev/null || true
            grep -q '^NO_START' /etc/default/dropbear 2>/dev/null || echo 'NO_START=0' >> /etc/default/dropbear
            systemctl daemon-reload
            systemctl enable dropbear
            systemctl restart dropbear 2>/dev/null || systemctl start dropbear || true
          fi
          systemctl is-active dropbear && echo "[OK] Dropbear actif" || echo "[WARN] Dropbear inactif — nginx toujours OK"
          echo "[OK] nginx HTTP admin + OTA sans signature configuré"

