        After=network.target
        [Service]
        ExecStart=/usr/bin/python3 /opt/bacnet_device.py
        Restart=always
        [Install]
        WantedBy=multi-user.target
        SVCEOF
          systemctl daemon-reload
          systemctl enable bacnet
          systemctl start bacnet
          echo "[OK] BACnet/IP sur port 47808 (sans auth)"'
      loop: "{{ scenarios[scenario_id].services }}"
