    # ── nodered_server : Node-RED sans auth + flow exec ──
    # Mock Node-RED with a lightweight Python HTTP server (avoids slow npm install)
    - name: "[nodered_server] Écrire le script d'injection Node-RED"
      ansible.builtin.copy:
        dest: /tmp/inject_nodered.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e

          # Ensure Python 3 is available
          command -v python3 >/dev/null 2>&1 || apt-get install -y -qq python3

          # Deploy a lightweight Python mock that exposes the same endpoints as Node-RED.
          # This avoids the 15+ minute npm install of the real node-red package.
          cat > /opt/nodered_mock.py << 'PYEOF'
          #!/usr/bin/env python3
          """Minimal Node-RED mock — exposes /admin, /flows, /settings without auth."""
          import json
          from http.server import HTTPServer, BaseHTTPRequestHandler

          FLOWS = [
              {"id": "flow1", "type": "tab", "label": "IoT Control"},
              {"id": "n1", "type": "inject", "z": "flow1", "name": "Heartbeat",
               "repeat": "60", "topic": "status", "wires": [["n2"]]},
              {"id": "n2", "type": "exec", "z": "flow1", "name": "SysInfo",
               "command": "hostname && uptime && cat /etc/os-release",
               "addpay": False, "wires": [["n3"], [], []]},
              {"id": "n3", "type": "debug", "z": "flow1", "name": "System Info",
               "active": True, "wires": []},
          ]

          ADMIN_HTML = b"""<!DOCTYPE html><html><head>
          <title>Node-RED</title>
          <meta charset="utf-8">
          </head><body>
          <h1>Node-RED</h1>
          <p>Flow Editor — no authentication required</p>
          <div id="main-container"><div id="editor"></div></div>
          <script>// Node-RED editor stub</script>
          </body></html>"""

          class NodeREDHandler(BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  pass  # suppress access logs

              def _send_json(self, data, code=200):
                  body = json.dumps(data).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def _send_html(self, body, code=200):
                  self.send_response(code)
                  self.send_header("Content-Type", "text/html; charset=utf-8")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  if self.path.startswith("/admin") or self.path == "/":
                      self._send_html(ADMIN_HTML)
                  elif self.path == "/flows":
                      self._send_json(FLOWS)
                  elif self.path == "/settings":
                      self._send_json({"httpAdminRoot": "/admin", "version": "3.1.0",
                                       "user": None, "editorTheme": {}})
                  elif self.path == "/nodes":
                      self._send_json([{"id": "exec", "name": "exec", "types": ["exec"],
                                        "enabled": True, "local": False}])
                  else:
                      self._send_json({"error": "not found"}, 404)

              def do_POST(self):
                  length = int(self.headers.get("Content-Length", 0))
                  self.rfile.read(length)
                  self._send_json({"rev": "abc123"})

          if __name__ == "__main__":
              srv = HTTPServer(("0.0.0.0", 1880), NodeREDHandler)
              srv.serve_forever()
          PYEOF
          chmod +x /opt/nodered_mock.py

          printf '[Unit]\nDescription=Node-RED IoT mock (benchmark - no auth)\nAfter=network.target\n[Service]\nExecStart=/usr/bin/python3 /opt/nodered_mock.py\nRestart=on-failure\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/nodered.service
          systemctl daemon-reload
          systemctl enable nodered
          systemctl start nodered
          sleep 1
          systemctl is-active nodered && echo "[OK] Node-RED mock actif sur port 1880" || { journalctl -u nodered -n 10 --no-pager; echo "[WARN] Node-RED inactif"; }

