    # ── ssh_server_v2 : SSH key-only mais authorized_keys world-readable (644) ──
    - name: "[ssh_server_v2] Écrire le script d'injection SSH v2"
      ansible.builtin.copy:
        dest: /tmp/inject_ssh_v2.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq openssh-server

          # Create iot-admin user
          useradd -m -s /bin/bash iot-admin 2>/dev/null || true

          # Generate SSH key pair (simulating a deployed key)
          mkdir -p /home/iot-admin/.ssh
          ssh-keygen -t ed25519 -f /home/iot-admin/.ssh/id_ed25519 -N "" -q -y 2>/dev/null || \
            ssh-keygen -t ed25519 -f /home/iot-admin/.ssh/id_ed25519 -N "" -q <<< "y"
          cp /home/iot-admin/.ssh/id_ed25519.pub /home/iot-admin/.ssh/authorized_keys

          # FLAW: authorized_keys world-readable (should be 600)
          chmod 644 /home/iot-admin/.ssh/authorized_keys
          chmod 755 /home/iot-admin/.ssh
          chown -R iot-admin:iot-admin /home/iot-admin/.ssh

          # Disable password auth — key-only
          sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
          sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config

          # FLAW: private key left on the server (readable by any local user)
          chmod 644 /home/iot-admin/.ssh/id_ed25519

          # Config file with network credentials (readable)
          mkdir -p /etc/iot
          cat > /etc/iot/config.json << 'CFGEOF'
          {"mqtt_broker":"192.168.100.12","mqtt_user":"bridge","mqtt_pass":"br1dg3_pass",
           "db_host":"192.168.100.14","db_user":"root","db_pass":"","api_key":"sk-bench-9f3a"}
          CFGEOF
          chmod 644 /etc/iot/config.json

          systemctl enable ssh
          systemctl restart ssh
          echo "[OK] SSH key-only + authorized_keys world-readable configuré"

