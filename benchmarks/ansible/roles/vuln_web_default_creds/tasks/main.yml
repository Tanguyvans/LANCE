---
- name: Install apache2-utils for htpasswd
  ansible.builtin.apt:
    name: apache2-utils
    state: present

- name: Ensure admin directory exists
  ansible.builtin.file:
    path: /var/www/html/admin
    state: directory
    mode: '0755'

- name: Create vulnerable admin page
  ansible.builtin.copy:
    dest: /var/www/html/admin/index.html
    content: |
      <html><body>
      <h1>Admin Panel</h1>
      <p>Device Management Interface</p>
      <p>Firmware: v1.2.3</p>
      <p>Uptime: 47 days</p>
      </body></html>
    mode: '0644'

- name: Create htpasswd file with default credentials
  ansible.builtin.shell: |
    htpasswd -cb /etc/nginx/.htpasswd admin password
  args:
    creates: /etc/nginx/.htpasswd

- name: Configure nginx with basic auth on admin
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/default
    content: |
      server {
          listen 80 default_server;
          root /var/www/html;
          index index.html;

          location / {
              try_files $uri $uri/ =404;
          }

          location /admin {
              auth_basic "Admin Panel";
              auth_basic_user_file /etc/nginx/.htpasswd;
              try_files $uri $uri/ =404;
          }
      }
    mode: '0644'

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
