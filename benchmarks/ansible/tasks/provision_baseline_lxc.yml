---
# Provision a single baseline LXC on Proxmox and register it for SSH.
#
# Required vars (passed by the caller, either play-level or via include_tasks vars):
#   baseline_vmid              int  LXC VMID (e.g. 201 or 1000+ for fleet)
#   baseline_hostname          str  LXC hostname (e.g. nato-baseline-1)
#   baseline_storage           str  Proxmox storage pool (from group_vars)
#   baseline_storage_override  str  Optional per-fleet-item override (empty = use baseline_storage)
#   baseline_disk_size         int  Root disk size in GB
#   baseline_memory            int  RAM in MB
#   baseline_cores             int  CPU cores
#   baseline_benchmark_ip      str  Static IPv4 on the benchmark bridge
#   benchmark_bridge           str  Proxmox bridge name (e.g. vmbr1)
#   baseline_inventory_name    str  Inventory group/host name registered after SSH is up
#                                   (defaults to "baseline" for back-compat)

- name: Resolve effective storage for baseline LXC {{ baseline_vmid }}
  ansible.builtin.set_fact:
    effective_baseline_storage: "{{ (baseline_storage_override | default('')) or baseline_storage }}"

- name: Check if baseline LXC {{ baseline_vmid }} already exists
  ansible.builtin.command: pct status {{ baseline_vmid }}
  register: baseline_status
  failed_when: false
  changed_when: false

- name: Create isolated baseline LXC {{ baseline_vmid }} with dual NIC
  ansible.builtin.command: >
    pct create {{ baseline_vmid }}
    /var/lib/vz/template/cache/debian-13-standard_13.1-2_amd64.tar.zst
    --hostname {{ baseline_hostname }}
    --storage {{ effective_baseline_storage }}
    --rootfs {{ effective_baseline_storage }}:{{ baseline_disk_size }}
    --memory {{ baseline_memory }}
    --cores {{ baseline_cores }}
    --password {{ vault_master_root_password }}
    --net0 name=eth0,bridge=vmbr0,ip=dhcp
    --net1 name=eth1,bridge={{ benchmark_bridge }},ip={{ baseline_benchmark_ip }}/24
    --nameserver 1.1.1.1
    --onboot 1
    --unprivileged 1
    --features nesting=1
  when: baseline_status.rc != 0

- name: Start baseline LXC {{ baseline_vmid }}
  ansible.builtin.command: pct start {{ baseline_vmid }}
  register: baseline_start
  failed_when: baseline_start.rc != 0 and 'already running' not in baseline_start.stderr

- name: Get baseline {{ baseline_vmid }} management IP
  ansible.builtin.command: pct exec {{ baseline_vmid }} -- ip -4 addr show eth0
  register: baseline_ip_raw
  retries: 10
  delay: 3
  until: (baseline_ip_raw.stdout | regex_search('inet (\\d+\\.\\d+\\.\\d+\\.\\d+)')) is not none

- name: Extract baseline {{ baseline_vmid }} management IP
  ansible.builtin.set_fact:
    baseline_ip: "{{ baseline_ip_raw.stdout | regex_search('inet (\\d+\\.\\d+\\.\\d+\\.\\d+)', '\\1') | first }}"

- name: Read controller SSH public key
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
  delegate_to: localhost
  register: controller_pubkey

- name: Ensure root SSH directory exists in baseline LXC {{ baseline_vmid }}
  ansible.builtin.command: pct exec {{ baseline_vmid }} -- mkdir -p /root/.ssh
  changed_when: false

- name: Install controller SSH public key in baseline LXC {{ baseline_vmid }}
  ansible.builtin.command: pct exec {{ baseline_vmid }} -- tee /root/.ssh/authorized_keys
  args:
    stdin: "{{ controller_pubkey.content | b64decode | trim }}\n"
  changed_when: true

- name: Fix baseline {{ baseline_vmid }} root SSH permissions
  ansible.builtin.command: >
    pct exec {{ baseline_vmid }} --
    sh -c 'chmod 700 /root/.ssh && chmod 600 /root/.ssh/authorized_keys'
  changed_when: false

- name: Register baseline host {{ baseline_inventory_name | default('baseline') }} for configuration
  ansible.builtin.add_host:
    name: "{{ baseline_inventory_name | default('baseline') }}"
    groups: "{{ baseline_inventory_groups | default(['baseline']) }}"
    ansible_host: "{{ baseline_ip }}"
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    baseline_benchmark_ip: "{{ baseline_benchmark_ip }}"
    baseline_vmid: "{{ baseline_vmid }}"
    benchmark_bridge: "{{ benchmark_bridge }}"

- name: Remove stale baseline {{ baseline_vmid }} SSH host key from controller known_hosts
  ansible.builtin.command: ssh-keygen -R {{ baseline_ip }}
  delegate_to: localhost
  register: baseline_known_host_remove
  changed_when: "'Host ' in baseline_known_host_remove.stdout or 'updated original contents' in baseline_known_host_remove.stderr"
  failed_when: false

- name: Wait for baseline {{ baseline_vmid }} SSH
  ansible.builtin.wait_for:
    host: "{{ baseline_ip }}"
    port: 22
    delay: 5
    timeout: 60

- name: Scan current baseline {{ baseline_vmid }} SSH host key
  ansible.builtin.command: ssh-keyscan -T 10 {{ baseline_ip }}
  delegate_to: localhost
  register: baseline_host_key
  changed_when: false
  retries: 6
  delay: 5
  until: baseline_host_key.rc == 0 and baseline_host_key.stdout | length > 0

- name: Trust current baseline {{ baseline_vmid }} SSH host key on controller
  ansible.builtin.known_hosts:
    name: "{{ baseline_ip }}"
    key: "{{ baseline_host_key.stdout }}"
    state: present
  delegate_to: localhost
