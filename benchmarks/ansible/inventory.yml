# Inventaire Ansible pour le benchmark Proxmox
# Réseau de management : accès SSH direct sur le nœud Proxmox
#
# Avant de lancer :
#   1. Renseigner ansible_host avec l'IP de votre Proxmox
#   2. Copier votre clé SSH sur le Proxmox : ssh-copy-id root@<IP>
#   3. Créer le token API (fait par 00_proxmox_init.yml ou manuellement)
#   4. Renseigner vault_proxmox_token dans un fichier Ansible Vault

all:
  hosts:
    proxmox:
      ansible_host: 10.0.0.110
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # ── VM Maître (pentest orchestrator) ──
    # ansible_host sera mis à jour après déploiement avec l'IP DHCP obtenue
    master:
      ansible_host: "{{ master_ip | default('10.0.0.10') }}"
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  vars:
    # ── Proxmox API (utilisé par les modules community.general.proxmox_kvm) ──
    proxmox_api_host: "{{ hostvars['proxmox']['ansible_host'] }}"
    proxmox_api_user: "ansible@pam"
    proxmox_api_token_id: "benchmark"
    proxmox_api_token_secret: "{{ vault_proxmox_token }}"   # Ansible Vault

    # Les autres variables (réseau, stockage, VMIDs) sont dans group_vars/all.yml
