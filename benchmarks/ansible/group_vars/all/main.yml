# Variables globales du benchmark
# Les secrets (vault_proxmox_token) sont dans vault.yml (chiffré Ansible Vault)

# ── Proxmox ──
proxmox_node: "nato-proxmox"
proxmox_storage: "local-lvm"
proxmox_iso_storage: "local"
proxmox_images_dir: "/var/lib/vz/template/iso"

# ── Réseau ──
benchmark_bridge: "vmbr1"
benchmark_network: "192.168.100.0/24"
benchmark_gateway: "192.168.100.1"
benchmark_dns: "192.168.100.1"   # dnsmasq OpenWrt (UDP 53 vers WAN filtré)
benchmark_lan_nic: "nic1"        # NIC physique exposé sur vmbr1 pour accès direct au réseau benchmark

# ── IDs templates ──
tpl_debian_vmid: 9000    # CT LXC — Debian 13 (tous les services Linux)
tpl_openwrt_vmid: 9010   # KVM    — OpenWrt x86-64 configuré (LAN=192.168.100.1)

# ── IDs scénarios (plage VMIDs par scénario : base → base+N) ──
# base+0   : router OpenWrt
# base+1…N : services LXC (vmid_offset défini dans scenarios ci-dessous)
# S11 utilise une plage de 15 VMIDs (220-234) — scénario 15 VMs
scenario_vmid_ranges:
  "1": 100   # S1 Flat              → 100-109
  "2": 110   # S2 Gateway           → 110-119
  "3": 120   # S3 NATO Lab          → 120-129
  "4": 130   # S4 Segmenté          → 130-139
  "5": 150   # S5 Building          → 150-159
  "6": 160   # S6 Domotique         → 160-169
  "7": 170   # S7 Edge-Cloud pivot  → 170-179
  "8": 180   # S8 Multi-zone IT/IoT/OT → 180-189
  "9": 190   # S9 Mesh IoT          → 190-199
  "10": 210  # S10 Flat variantes   → 210-219
  "11": 220  # S11 Smart City 3 zones → 220-234 (15 VMs)

# ── Credentials par défaut injectés dans les VMs (failles F1) ──
# Ces valeurs sont volontairement faibles : c'est le but du benchmark
vm_default_user: "pi"
vm_default_password: "benchmark"   # Remplacé par les failles selon le scénario

# ── Définition des scénarios ──
# Source unique de vérité pour 03_deploy_scenario, 04_inject_vulns, 05_populate_services, 06_verify
# Chaque service : { name, vmid_offset, ip, role }
# router_vulns  : liste des vulnérabilités OpenWrt à activer (telnet, admin_wan, ftp)
scenarios:
  "1":
    name: "Réseau plat"
    router_vulns: [telnet]
    services:
      - { name: mqtt,  vmid_offset: 1, ip: "192.168.100.11", role: "mqtt_broker"  }
      - { name: web,   vmid_offset: 2, ip: "192.168.100.12", role: "web_server"   }
      - { name: ssh,   vmid_offset: 3, ip: "192.168.100.13", role: "ssh_server"   }

  "2":
    name: "Gateway exposée"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: web,    vmid_offset: 1, ip: "192.168.100.11", role: "web_server"   }
      - { name: mqtt,   vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker"  }
      - { name: iot-gw, vmid_offset: 3, ip: "192.168.100.13", role: "iot_gateway"  }
      - { name: db,     vmid_offset: 4, ip: "192.168.100.14", role: "db_server"    }
      - { name: jump,   vmid_offset: 5, ip: "192.168.100.15", role: "ssh_server"   }

  "3":
    name: "Réplique NATO Lab"
    router_vulns: [telnet, ftp]
    services:
      - { name: wisgate,  vmid_offset: 1, ip: "192.168.100.11", role: "iot_gateway"  }
      - { name: rpi5,     vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker"  }
      - { name: iot-hub,  vmid_offset: 3, ip: "192.168.100.13", role: "mqtt_broker"  }
      - { name: jetson,   vmid_offset: 4, ip: "192.168.100.14", role: "ssh_server"   }
      - { name: ap,       vmid_offset: 5, ip: "192.168.100.15", role: "web_server"   }
      - { name: cam,      vmid_offset: 6, ip: "192.168.100.16", role: "web_server"   }
      - { name: nvr,      vmid_offset: 7, ip: "192.168.100.17", role: "nvr_server"   }

  "4":
    name: "Réseau segmenté"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: admin,     vmid_offset: 1, ip: "192.168.100.11", role: "ssh_server"    }
      - { name: webapp,    vmid_offset: 2, ip: "192.168.100.12", role: "web_upload"    }
      - { name: mqtt,      vmid_offset: 3, ip: "192.168.100.13", role: "mqtt_broker"   }
      - { name: lora-gw,   vmid_offset: 4, ip: "192.168.100.14", role: "iot_gateway"   }
      - { name: plc,       vmid_offset: 5, ip: "192.168.100.15", role: "modbus_server" }
      - { name: hmi,       vmid_offset: 6, ip: "192.168.100.16", role: "web_server"    }
      - { name: historian, vmid_offset: 7, ip: "192.168.100.17", role: "db_server"     }

  "5":
    name: "Smart Building"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: cam1,        vmid_offset: 1, ip: "192.168.100.11", role: "camera_server" }
      - { name: cam2,        vmid_offset: 2, ip: "192.168.100.12", role: "camera_server" }
      - { name: nvr,         vmid_offset: 3, ip: "192.168.100.13", role: "nvr_server"    }
      - { name: access-ctrl, vmid_offset: 4, ip: "192.168.100.14", role: "web_server"    }
      - { name: hvac,        vmid_offset: 5, ip: "192.168.100.15", role: "web_server"    }
      - { name: mqtt,        vmid_offset: 6, ip: "192.168.100.16", role: "mqtt_broker"   }
      - { name: web,         vmid_offset: 7, ip: "192.168.100.17", role: "web_server"    }

  "6":
    name: "Domotique centralisée"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: hub,  vmid_offset: 1, ip: "192.168.100.11", role: "iot_gateway"    }
      - { name: mqtt, vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker"    }
      - { name: db,   vmid_offset: 3, ip: "192.168.100.13", role: "db_server"      }
      - { name: cam,  vmid_offset: 4, ip: "192.168.100.14", role: "camera_server"  }
      - { name: web,  vmid_offset: 5, ip: "192.168.100.15", role: "web_server"     }

  "7":
    name: "Edge-Cloud pivot"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: edge-gw,      vmid_offset: 1, ip: "192.168.100.11", role: "iot_gateway" }
      - { name: edge-mqtt,    vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker" }
      - { name: edge-compute, vmid_offset: 3, ip: "192.168.100.13", role: "ssh_server"  }
      - { name: cloud-api,    vmid_offset: 4, ip: "192.168.100.14", role: "web_upload"  }
      - { name: cloud-db,     vmid_offset: 5, ip: "192.168.100.15", role: "db_server"   }

  "8":
    name: "Multi-zone IT/IoT/OT"
    router_vulns: [telnet, admin_wan]
    services:
      - { name: admin,    vmid_offset: 1, ip: "192.168.100.11", role: "ssh_server_v2"   }
      - { name: mqtt,     vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker_v2"  }
      - { name: iot-gw,   vmid_offset: 3, ip: "192.168.100.13", role: "iot_gateway"     }
      - { name: plc,      vmid_offset: 4, ip: "192.168.100.14", role: "modbus_server"   }
      - { name: hmi,      vmid_offset: 5, ip: "192.168.100.15", role: "web_server_v2"   }
      - { name: redis,    vmid_offset: 6, ip: "192.168.100.16", role: "db_server_v2"    }
      - { name: historian, vmid_offset: 7, ip: "192.168.100.17", role: "db_server"      }

  "9":
    name: "Mesh IoT"
    router_vulns: [telnet]
    services:
      - { name: mqtt-1,   vmid_offset: 1, ip: "192.168.100.11", role: "mqtt_broker"     }
      - { name: mqtt-2,   vmid_offset: 2, ip: "192.168.100.12", role: "mqtt_broker_v2"  }
      - { name: mqtt-3,   vmid_offset: 3, ip: "192.168.100.13", role: "mqtt_broker"     }
      - { name: coap,     vmid_offset: 4, ip: "192.168.100.14", role: "coap_server"     }
      - { name: snmp,     vmid_offset: 5, ip: "192.168.100.15", role: "snmp_server"     }

  "10":
    name: "Flat avec variantes"
    router_vulns: [telnet, ftp]
    services:
      - { name: mqtt,     vmid_offset: 1, ip: "192.168.100.11", role: "mqtt_broker_v2"  }
      - { name: web,      vmid_offset: 2, ip: "192.168.100.12", role: "web_server_v2"   }
      - { name: ftp,      vmid_offset: 3, ip: "192.168.100.13", role: "ftp_server"      }
      - { name: nodered,  vmid_offset: 4, ip: "192.168.100.14", role: "nodered_server"  }
      - { name: ssh,      vmid_offset: 5, ip: "192.168.100.15", role: "ssh_server_v2"   }

  "11":
    name: "Smart City 3 zones"
    router_vulns: [telnet, admin_wan]
    services:
      # Zone IT — Management
      - { name: admin,   vmid_offset: 1,  ip: "192.168.100.11", role: "ssh_server"    }
      - { name: jump,    vmid_offset: 2,  ip: "192.168.100.12", role: "ssh_server_v2" }
      - { name: monitor, vmid_offset: 3,  ip: "192.168.100.13", role: "web_server_v2" }
      # Zone IoT
      - { name: mqtt,    vmid_offset: 4,  ip: "192.168.100.14", role: "mqtt_broker"    }
      - { name: mqtt2,   vmid_offset: 5,  ip: "192.168.100.15", role: "mqtt_broker_v2" }
      - { name: gw1,     vmid_offset: 6,  ip: "192.168.100.16", role: "iot_gateway"    }
      - { name: gw2,     vmid_offset: 7,  ip: "192.168.100.17", role: "iot_gateway"    }
      - { name: nodered, vmid_offset: 8,  ip: "192.168.100.18", role: "nodered_server" }
      # Zone OT — Operational Technology
      - { name: plc1,    vmid_offset: 9,  ip: "192.168.100.19", role: "modbus_server"  }
      - { name: plc2,    vmid_offset: 10, ip: "192.168.100.20", role: "modbus_server"  }
      - { name: hmi,     vmid_offset: 11, ip: "192.168.100.21", role: "web_server"     }
      - { name: ftp,     vmid_offset: 12, ip: "192.168.100.22", role: "ftp_server"     }
      - { name: db-ot,   vmid_offset: 13, ip: "192.168.100.23", role: "db_server"      }
      - { name: redis,   vmid_offset: 14, ip: "192.168.100.24", role: "db_server_v2"   }
