meta:
  id: s01
  name: "Flat + Auth Faible"
  architecture: A1
  packs: [F1]
  difficulty: easy
  description: "Réseau plat avec failles d'authentification basiques"

networks:
  lan:
    bridge: vmbr0
    subnet: "192.168.1.0/24"
    gateway: "192.168.1.1"

vms:
  mqtt_broker:
    template: tpl-debian
    vmid_offset: 201
    cores: 1
    memory: 512
    networks:
      - bridge: vmbr0
    ip: "192.168.1.201"
    vuln_roles:
      - vuln_mqtt_anonymous

  web_server:
    template: tpl-debian
    vmid_offset: 202
    cores: 1
    memory: 512
    networks:
      - bridge: vmbr0
    ip: "192.168.1.202"
    vuln_roles:
      - vuln_web_default_creds

  ssh_server:
    template: tpl-debian
    vmid_offset: 203
    cores: 1
    memory: 512
    networks:
      - bridge: vmbr0
    ip: "192.168.1.203"
    vuln_roles:
      - vuln_ssh_default_creds

  iot_device:
    template: tpl-debian
    vmid_offset: 204
    cores: 1
    memory: 256
    networks:
      - bridge: vmbr0
    ip: "192.168.1.204"
    vuln_roles:
      - vuln_snmp_public

ground_truth:
  vulnerabilities:
    - id: V1
      device: mqtt_broker
      ip: "192.168.1.201"
      type: misconfiguration
      severity: high
      cvss: 7.5
      description: "MQTT broker accepts anonymous connections without authentication"
      category: authentication
      detection_method: "mosquitto_sub/pub without credentials, nmap port 1883"
      port: 1883
      service: mqtt

    - id: V2
      device: web_server
      ip: "192.168.1.202"
      type: default_credentials
      severity: high
      cvss: 7.2
      description: "Nginx admin panel accessible with default credentials (admin/password)"
      category: authentication
      detection_method: "HTTP login attempt with admin/password"
      port: 80
      service: http

    - id: V3
      device: ssh_server
      ip: "192.168.1.203"
      type: default_credentials
      severity: critical
      cvss: 9.8
      description: "SSH server accepts login with default credentials (admin/admin)"
      category: authentication
      detection_method: "SSH brute force, ssh with admin/admin"
      port: 22
      service: ssh

    - id: V4
      device: iot_device
      ip: "192.168.1.204"
      type: misconfiguration
      severity: medium
      cvss: 5.3
      description: "SNMP service with default community string 'public'"
      category: authentication
      detection_method: "snmpwalk with community string 'public'"
      port: 161
      service: snmp

  attack_paths:
    - id: P1
      chain: [mqtt_broker]
      vulnerabilities_used: [V1]
      description: "Direct access to MQTT broker without authentication"
      impact: "Read/write all MQTT messages, control IoT devices"
      difficulty: easy

    - id: P2
      chain: [ssh_server]
      vulnerabilities_used: [V3]
      description: "SSH login with default credentials gives full shell access"
      impact: "Full system access, pivot to other devices"
      difficulty: easy

    - id: P3
      chain: [ssh_server, mqtt_broker]
      vulnerabilities_used: [V3, V1]
      description: "SSH into server, then publish malicious MQTT messages"
      impact: "Control IoT devices via MQTT from compromised server"
      difficulty: easy
