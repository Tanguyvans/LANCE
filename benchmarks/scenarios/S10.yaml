attack_paths:
- id: P1
  title: FTP anonymous → credentials → MQTT pivot
  difficulty: easy
  chain:
  - hop: 1
    device: Internet
    action: Connexion FTP anonyme
  - hop: 2
    device: s10-ftp (100.13)
    action: Download config/network.conf
  - hop: 3
    device: s10-mqtt (100.11)
    action: Login MQTT avec creds récupérés
  vulnerabilities_used:
  - V8
  - V9
  - V3
