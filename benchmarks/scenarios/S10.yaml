- id: P2
  title: Node-RED RCE → pivot réseau
  difficulty: easy
  chain:
  - hop: 1
    device: Internet
    action: Accès Node-RED sans auth
  - hop: 2
    device: s10-nodered (100.14)
    action: Créer flow exec → shell root
  - hop: 3
    device: s10-web (100.12)
    action: Accès API → /api/config
  vulnerabilities_used:
  - V10
  - V11
  - V5
  impact: RCE via Node-RED + accès à toute la config réseau
- id: P3
  title: API REST RCE → SSH key theft → lateral movement
  difficulty: medium
  chain:
  - hop: 1
    device: Internet
    action: POST /api/exec → shell
  - hop: 2
    device: s10-web (100.12)
    action: Récupérer credentials /api/users
  - hop: 3
    device: s10-ssh (100.15)
    action: Lire clé privée SSH (644)
  vulnerabilities_used:
  - V6
  - V7
  - V12
