- id: P3
  title: Compromission SSH Jetson → exfiltration credentials → pivot MQTT
  difficulty: medium
  chain:
  - hop: 1
    device: Internet
    action: SSH admin:admin
  - hop: 2
    device: s3-jetson (100.14)
    action: cat /etc/iot/config.json
  - hop: 3
    device: s3-rpi5 (100.12)
    action: Subscribe MQTT avec credentials MQTT
  - hop: 4
    device: s3-iot-hub (100.13)
    action: Subscribe second broker MQTT
  vulnerabilities_used:
  - V7
  - V5
  - V6
  impact: Accès aux deux brokers MQTT, lecture de tous les capteurs et credentials
- id: P4
  title: MITM Terrapin WisGate → accès admin IoT
  difficulty: hard
  chain:
  - hop: 1
    device: Internet
    action: Position MITM réseau
  - hop: 2
    device: s3-wisgate (100.11)
    action: Exploit CVE-2023-48795 (Terrapin)
  - hop: 3
    device: s3-wisgate (100.11)
    action: Accès /admin + /api/devices
  - hop: 4
    device: s3-rpi5 (100.12)
    action: Subscribe MQTT anonyme
  vulnerabilities_used:
  - V3
  - V4
  - V5
  impact: Contrôle de la gateway IoT principale, accès au réseau de capteurs
- id: P5
  title: Chaîne complète FTP → credentials → pivot multi-hop
  difficulty: hard
  chain:
  - hop: 1
    device: Internet
    action: FTP anonyme sur routeur
  - hop: 2
    device: s3-router (100.1)
    action: Exfiltration fichiers config
  - hop: 3
    device: s3-jetson (100.14)
    action: SSH avec credentials trouvés
  - hop: 4
    device: s3-iot-hub (100.13)
    action: MQTT subscribe → données capteurs
  - hop: 5
    device: s3-nvr (100.17)
    action: SSH ubnt:ubnt → accès NVR
  vulnerabilities_used:
  - V2
  - V7
  - V6
  - V10
