  - hop: 1
    device: Internet
    action: Telnet vers routeur
  - hop: 2
    device: s3-router (100.1)
    action: Accès admin shell
  - hop: 3
    device: s3-rpi5 (100.12)
    action: Subscribe MQTT sans auth
  vulnerabilities_used:
  - V1
  - V5
  impact: Lecture de tous les topics capteurs + credentials admin via MQTT
- id: P2
  title: Découverte réseau via API WisGate → pivot DB
  difficulty: medium
  chain:
  - hop: 1
    device: Internet
    action: HTTP vers 10.30.0.11
  - hop: 2
    device: s3-wisgate (100.11)
    action: GET /api/status → 100.14:3306
  - hop: 3
    device: s3-wisgate (100.11)
    action: GET /api/devices → topologie
  vulnerabilities_used:
  - V4
