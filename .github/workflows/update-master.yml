name: Update Master VM

# Auto-update en pause : la VM maître est arrêtée (benchmarks terminés pour l'instant).
# Le runner self-hosted "nato-master" est offline, donc le déclencheur "push" est
# désactivé pour éviter des workflows en échec à chaque commit.
# Pour réactiver : remettre le bloc "push: branches: [main]" ci-dessous.
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: [self-hosted, nato-master]

    steps:
      - name: Pull latest code
        run: git -C /opt/nato-smartcity-iot pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Tanguyvans/NATO-SmartCity-IoT.git main

      - name: Install Python dependencies
        run: /opt/nato-smartcity-iot/venv/bin/pip install -r /opt/nato-smartcity-iot/requirements.txt --quiet

      - name: Restart FastAPI
        run: systemctl restart nato-fastapi
