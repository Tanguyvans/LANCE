name: Update Master VM

# Auto-update actif : à chaque push sur main, CHAQUE master self-hosted fait
# git pull + pip install + restart nato-fastapi. La matrix cible les deux runners
# (nato-master = pve-benchmark, nato-master-2 = pve) → les deux boxes se mettent
# à jour. fail-fast: false → si un box est offline, l'autre se met quand même à jour.
# Les fichiers env-spécifiques (inventory.yml, main.yml, vault_master.yml) sont en
# skip-worktree sur chaque master → le pull ne les écrase pas. Ne jamais commiter ces 3.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        runner: [nato-master, nato-master-2]
    runs-on: [self-hosted, "${{ matrix.runner }}"]

    steps:
      - name: Pull latest code
        run: git -C /opt/nato-smartcity-iot pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Tanguyvans/LANCE.git main

      - name: Install Python dependencies
        run: /opt/nato-smartcity-iot/venv/bin/pip install -r /opt/nato-smartcity-iot/requirements.txt --quiet

      - name: Restart FastAPI
        run: systemctl restart nato-fastapi
