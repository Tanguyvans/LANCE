name: Update Master VM

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: [self-hosted, nato-master]

    steps:
      - name: Pull latest code
        run: git -C /opt/nato-smartcity-iot pull origin main

      - name: Install Python dependencies
        run: /opt/nato-smartcity-iot/venv/bin/pip install -r /opt/nato-smartcity-iot/requirements.txt --quiet

      - name: Stop FastAPI (graceful)
        run: systemctl stop nato-fastapi || true

      - name: Kill any process still holding port 8501
        run: ss -tlnp 'sport = :8501' | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 || true

      - name: Start FastAPI
        run: systemctl start nato-fastapi
