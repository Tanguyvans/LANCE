# ssh_hardening.yaml - Sécurisation SSH sur tous les devices Linux
# Usage: ansible-playbook playbooks/ssh_hardening.yaml
#
# Ce que fait ce playbook :
# - Désactive l'authentification par mot de passe
# - Désactive le login root direct
# - Change le port SSH (optionnel)
# - Déploie les clés SSH autorisées
# - Configure les algorithmes crypto forts
# - Restart le service sshd

- name: Hardening SSH sur les hosts Linux
  hosts: ssh_devices
  become: true

  vars:
    ssh_port: 22
    ssh_permit_root_login: "no"
    ssh_password_auth: "no"
    ssh_max_auth_tries: 3
    ssh_authorized_keys_file: "~/.ssh/authorized_keys"
    # Clé publique à déployer (à personnaliser)
    ssh_public_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub', errors='ignore') | default('') }}"

  tasks:
    # ── Vérification de connectivité ──
    - name: Test de connectivité SSH
      ansible.builtin.ping:
      tags: [check]

    # ── Déploiement de clé SSH ──
    - name: Créer le répertoire .ssh
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        mode: "0700"
        owner: "{{ ansible_user }}"
      tags: [keys]

    - name: Déployer la clé publique SSH
      ansible.builtin.authorized_key:
        user: "{{ ansible_user }}"
        key: "{{ ssh_public_key }}"
        state: present
      when: ssh_public_key | length > 0
      tags: [keys]

    # ── Configuration sshd ──
    - name: Désactiver l'authentification par mot de passe
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication {{ ssh_password_auth }}"
        validate: "sshd -t -f %s"
      notify: restart sshd
      tags: [config]

    - name: Désactiver le login root
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin {{ ssh_permit_root_login }}"
        validate: "sshd -t -f %s"
      notify: restart sshd
      tags: [config]

    - name: Limiter les tentatives d'auth
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?MaxAuthTries"
        line: "MaxAuthTries {{ ssh_max_auth_tries }}"
        validate: "sshd -t -f %s"
      notify: restart sshd
      tags: [config]

    - name: Désactiver les protocoles faibles
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED - Crypto hardening"
        block: |
          # Algorithmes forts uniquement
          KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org
          Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
          MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
          HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
        validate: "sshd -t -f %s"
      notify: restart sshd
      tags: [config, crypto]

    - name: Configurer le banner SSH
      ansible.builtin.copy:
        content: |
          ╔══════════════════════════════════════════════════════╗
          ║  NATO Smart City IoT Lab - Accès autorisé seulement ║
          ║  Toute activité est journalisée et surveillée        ║
          ╚══════════════════════════════════════════════════════╝
        dest: /etc/ssh/banner
        mode: "0644"
      tags: [config]

    - name: Activer le banner dans sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Banner"
        line: "Banner /etc/ssh/banner"
        validate: "sshd -t -f %s"
      notify: restart sshd
      tags: [config]

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
