# recon.yaml - Reconnaissance réseau du lab (audit de sécurité)
# Usage: ansible-playbook playbooks/recon.yaml
#
# Ce que fait ce playbook :
# - Collecte les infos système de chaque host
# - Vérifie les ports ouverts
# - Vérifie les versions SSH
# - Teste la connectivité MQTT
# - Génère un rapport dans output/ansible/

- name: Reconnaissance réseau du lab IoT
  hosts: linux_hosts
  become: true
  gather_facts: true

  tasks:
    - name: Collecter les infos système
      ansible.builtin.debug:
        msg: |
          === {{ inventory_hostname }} ({{ ansible_host }}) ===
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Architecture: {{ ansible_architecture }}
          RAM: {{ ansible_memtotal_mb }} MB
          Uptime: {{ ansible_uptime_seconds | int // 3600 }}h
      tags: [info]

    - name: Lister les ports en écoute
      ansible.builtin.shell: ss -tlnp | grep LISTEN
      register: open_ports
      changed_when: false
      tags: [ports]

    - name: Afficher les ports ouverts
      ansible.builtin.debug:
        msg: "{{ open_ports.stdout_lines }}"
      tags: [ports]

    - name: Vérifier la version SSH
      ansible.builtin.shell: ssh -V 2>&1
      register: ssh_version
      changed_when: false
      tags: [ssh]

    - name: Afficher la version SSH
      ansible.builtin.debug:
        msg: "{{ ssh_version.stderr | default(ssh_version.stdout) }}"
      tags: [ssh]

    - name: Vérifier les utilisateurs avec shell de login
      ansible.builtin.shell: grep -v '/nologin\|/false' /etc/passwd | cut -d: -f1,7
      register: login_users
      changed_when: false
      tags: [users]

    - name: Afficher les utilisateurs avec login shell
      ansible.builtin.debug:
        msg: "{{ login_users.stdout_lines }}"
      tags: [users]

- name: Test connectivité MQTT
  hosts: mqtt_devices
  become: false

  tasks:
    - name: Tester la connexion MQTT (sans auth)
      ansible.builtin.shell: |
        timeout 3 mosquitto_sub -h {{ ansible_host }} -t '$SYS/#' -C 1 2>&1 || echo "Connection refused or auth required"
      register: mqtt_test
      changed_when: false
      failed_when: false
      tags: [mqtt]

    - name: Résultat test MQTT
      ansible.builtin.debug:
        msg: "{{ mqtt_test.stdout }}"
      tags: [mqtt]
