# NATO Smart City IoT Lab - Ansible Inventory
# Réseau: 192.168.88.0/24
# Basé sur infrastructure/nato_lab.yaml

all:
  vars:
    ansible_user: admin
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    lab_network: "192.168.88.0/24"

  children:
    # ── Routeurs & Switches ──
    network:
      children:
        routers:
          hosts:
            mikrotik:
              ansible_host: 192.168.88.1
              ansible_user: admin
              ansible_connection: network_cli
              ansible_network_os: routeros
              device_role: "Routeur/Firewall"
              os: "RouterOS"
              os_version: "7.18.2"
        switches:
          hosts:
            netgear:
              ansible_host: 192.168.88.1  # managed via MikroTik or SNMP
              ansible_connection: local
              device_role: "Switch PoE 48 ports"

    # ── Compute (Linux) ──
    compute:
      hosts:
        jetson:
          ansible_host: 192.168.88.248
          ansible_user: nvidia
          device_role: "Edge AI, Vision"
          os: "Ubuntu 22.04.5"
          firmware: "JetPack R36.4.7"
        nvr:
          ansible_host: 192.168.88.253
          ansible_user: root
          device_role: "Stockage vidéo surveillance"
          os: "UniFi OS 5.0.13"

    # ── Gateways IoT (Raspberry Pi / WisGate) ──
    gateways:
      children:
        raspberry_pis:
          hosts:
            rpi5:
              ansible_host: 192.168.88.247
              ansible_user: pi
              device_role: "Gateway Zigbee, MQTT Broker"
              os: "Debian 13 (Trixie)"
              mqtt_broker: true
              zigbee2mqtt: true
            iot_hub:
              ansible_host: 192.168.88.231
              ansible_user: pi
              device_role: "IoT Hub"
              os: "Debian 13 (Trixie)"
              mqtt_broker: true
          vars:
            ansible_python_interpreter: /usr/bin/python3
        lorawan_gateways:
          hosts:
            wisgate:
              ansible_host: 192.168.88.238
              ansible_user: root
              device_role: "Gateway LoRaWAN EU868"
              firmware: "RAK7268C"
              ssh_version: "Dropbear 2020.81"

    # ── Points d'accès WiFi ──
    access_points:
      hosts:
        eap613:
          ansible_host: 192.168.88.251
          ansible_connection: local  # géré via interface web
          device_role: "AP WiFi NATO-Lab"

    # ── Caméras ──
    cameras:
      hosts:
        cam_turret:
          ansible_host: 192.168.88.230
          ansible_connection: local  # géré via UniFi Protect
          device_role: "Caméra surveillance"
          firmware: "5.1.240"

    # ── Groupes fonctionnels (regroupements transversaux) ──
    mqtt_devices:
      hosts:
        rpi5:
        iot_hub:
        wisgate:

    ssh_devices:
      hosts:
        jetson:
        rpi5:
        iot_hub:
        wisgate:

    linux_hosts:
      hosts:
        jetson:
        rpi5:
        iot_hub:
