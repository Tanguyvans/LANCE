name: "http_get"
command: "curl"
args: ["-s", "--connect-timeout", "5", "--max-time", "10"]
enabled: true
timeout: 15
short_description: "HTTP GET with full body response"
description: >
  Fetch the full body of an HTTP URL. Unlike curl_headers which focuses on headers,
  this returns the full response body. Use to PROVE data exposure by showing actual
  file contents: SQL dumps, config files, .env files, backup data.
  Combine with path from directory listing to retrieve specific sensitive files.
max_output: 4000
parameters:
  - name: "url"
    type: "string"
    description: "Full URL (e.g. 'http://10.10.0.12/backup/db_backup_2024-01-15.sql')"
    required: true
    format: "positional"
