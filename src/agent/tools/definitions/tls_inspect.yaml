name: "tls_inspect"
handler: "python"
enabled: true
timeout: 15
short_description: "Inspect TLS cert + chain + cipher"
description: >
  Open a TLS connection to host:port and return JSON describing the leaf certificate (subject, issuer,
  SANs, not_before, not_after, serial), the negotiated cipher (name, version, bits), and a fingerprint
  preview. Detects self-signed, expired, or weak-cipher servers. Pure Python (ssl stdlib), no openssl
  binary required.
parameters:
  - name: "host"
    type: "string"
    description: "Target host."
    required: true
  - name: "port"
    type: "integer"
    description: "Target TLS port (default 443)."
    required: false
  - name: "sni"
    type: "string"
    description: "Optional SNI hostname (default = host)."
    required: false
