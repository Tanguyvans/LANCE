name: "nmap_scan"
command: "nmap"
args: ["-sV"]
enabled: true
timeout: 300
short_description: "Network port and service scanner"
description: "Run an nmap service version scan (-sV) on a target IP or subnet. Returns open ports, services, and versions. If a host was found by ARP but nmap says 'Host seems down', retry with skip_discovery=true to force scanning."
parameters:
  - name: "target"
    type: "string"
    description: "Target IP, hostname, or subnet (e.g. '192.168.88.0/24' or '192.168.88.1')"
    required: true
    format: "positional"
  - name: "ports"
    type: "string"
    description: "Optional port range (e.g. '22,80,443' or '1-1000'). If omitted, nmap uses default ports."
    required: false
    flag: "-p"
    format: "flag"
  - name: "skip_discovery"
    type: "boolean"
    description: "Skip host discovery (-Pn). Use when ARP confirms the host is up but nmap says 'Host seems down'."
    required: false
    flag: "-Pn"
    format: "boolean_flag"
  - name: "scripts"
    type: "string"
    description: "NSE scripts to run (e.g. 'mysql-empty-password', 'ssh-auth-methods', 'http-auth'). Maps to --script=<value>."
    required: false
    flag: "--script"
    format: "flag"
  - name: "udp_scan"
    type: "boolean"
    description: "Enable UDP scanning (-sU). Required for UDP services like SNMP (161/udp) and CoAP (5683/udp). Note: requires root/sudo."
    required: false
    flag: "-sU"
    format: "boolean_flag"
