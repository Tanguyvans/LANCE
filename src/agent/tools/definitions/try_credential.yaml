name: try_credential
handler: python
description: >
  Test a username/password credential against a service on a remote host.
  Supported services: ssh, http, ftp, mqtt.
  Returns success (bool), status_code or output, and evidence.
  Use this to validate harvested credentials before pivoting to the next hop.
tags: ["ssh", "http", "ftp", "mqtt", "intrusion", "lateral_movement"]
parameters:
  - name: ip
    type: string
    description: "Target IP address"
    required: true
  - name: service
    type: string
    description: "Service to test: ssh | http | ftp | mqtt"
    required: true
  - name: user
    type: string
    description: "Username to test"
    required: true
  - name: password
    type: string
    description: "Password to test"
    required: true
  - name: port
    type: integer
    description: "Service port (uses service default if omitted)"
    required: false
