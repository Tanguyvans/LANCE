name: "mqtt_listen"
command: "mosquitto_sub"
args: []
enabled: true
timeout: 15
short_description: "MQTT message listener"
description: |
  Listen for MQTT messages on a broker to check if anonymous access is allowed and what topics are exposed.
  IMPORTANT — exit code interpretation:
    return_code=0  : received all requested messages (anonymous access CONFIRMED)
    return_code=27 : timeout waiting for messages but connection was established (anonymous access CONFIRMED — broker is just idle)
    return_code=5  : connection refused by broker (authentication required)
    return_code=1  : generic error (broker unreachable or refused)
  A return_code of 27 with empty stdout means the broker accepted the anonymous connection but had no active traffic.
  This is a HIGH severity finding: the MQTT broker allows unauthenticated access.
parameters:
  - name: "broker"
    type: "string"
    description: "MQTT broker IP or hostname"
    required: true
    flag: "-h"
    format: "flag"
  - name: "topic"
    type: "string"
    description: "MQTT topic filter (default: '#' for all topics)"
    required: false
    default: "#"
    flag: "-t"
    format: "flag"
  - name: "count"
    type: "integer"
    description: "Number of messages to capture before stopping (default: 10)"
    required: false
    default: 10
    flag: "-C"
    format: "flag"
  - name: "timeout"
    type: "integer"
    description: "Max seconds to wait for messages (default: 5)"
    required: false
    default: 5
    flag: "-W"
    format: "flag"
  - name: "username"
    type: "string"
    description: "MQTT username for authenticated access (e.g. 'test'). Omit for anonymous connections."
    required: false
    flag: "-u"
    format: "flag"
  - name: "password"
    type: "string"
    description: "MQTT password for authenticated access (e.g. 'test'). Use with username."
    required: false
    flag: "-P"
    format: "flag"
return_code_map:
  0:  "anonymous_access_confirmed_messages_received"
  27: "anonymous_access_confirmed_broker_idle"
  5:  "connection_refused_auth_required"
  1:  "generic_error_broker_unreachable"
